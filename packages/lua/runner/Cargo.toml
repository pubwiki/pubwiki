[package]
name = "lua_runner_wasm"
version = "0.1.0"
edition = "2024"


[dependencies]
mlua = { version = "0.11", features = ["lua54", "async", "vendored"] }

# 异步运行时
async-executor = "1.13"
futures-lite = "2.3"
async-channel = "2.3"
once_cell = "1.19"

[dev-dependencies]
async-io = "2.3"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"

[lib]
name = "lua_runner"
path = "src/main.rs"
crate-type = ["cdylib", "rlib"]
