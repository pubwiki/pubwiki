          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: 每页数量
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: topic
          in: query
          description: 按 topic（hashtag）过滤
          schema:
            type: string
        - name: sortBy
          in: query
