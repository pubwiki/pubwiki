  /projects/{projectId}/artifacts:
    get:
      summary: 获取 Project 的 Artifact 列表
      description: |
        获取指定 Project 关联的所有 Artifact，支持分页和过滤。
        可选过滤条件：
        - roleId: 按角色过滤，传 null 表示获取无角色的 artifacts
        - isOfficial: 按是否官方过滤
      operationId: listProjectArtifacts
      tags:
        - Projects
      parameters:
        - name: projectId
          in: path
          required: true
          description: Project ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: 每页数量
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: roleId
          in: query
          description: 按角色 ID 过滤，传 "null" 字符串表示获取无角色的 artifacts
          schema:
            type: string
        - name: isOfficial
          in: query
          description: 按是否官方过滤
          schema:
            type: boolean
        - name: sortOrder
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 成功获取 Artifact 列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - artifacts
                  - pagination
                properties:
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectArtifact'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '404':
          description: Project 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    post:
      summary: 将 Artifact 链接到 Project
      description: |
        将一个 Artifact 关联到指定的 Project。
        - 必须指定角色（只能是叶子角色）
        - 可选指定是否为官方 artifact（只有 owner 或 maintainer 可以设置为 true）
      operationId: linkArtifactToProject
      tags:
        - Projects
      security:
        - cookieAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          description: Project ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - artifactId
                - roleId
              properties:
                artifactId:
                  type: string
                  format: uuid
                  description: 要关联的 Artifact ID
                roleId:
                  type: string
                  format: uuid
                  description: 角色 ID（必须是叶子角色）
                isOfficial:
                  type: boolean
                  default: false
                  description: 是否为官方 artifact（只有 owner/maintainer 可设置为 true）
      responses:
        '201':
          description: 关联成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - projectArtifact
                properties:
                  message:
                    type: string
                    example: Artifact linked to project successfully
                  projectArtifact:
                    $ref: '#/components/schemas/ProjectArtifact'
        '400':
          description: 请求参数错误（如角色不是叶子角色）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: 无权设置 isOfficial 为 true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Project、Artifact 或 Role 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Artifact 已经关联到此 Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

