                    $ref: '#/components/schemas/ProjectDetail'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Slug 已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /projects/{projectId}:
