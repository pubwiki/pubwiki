openapi: 3.1.0
info:
  title: PubWiki API
  version: 1.0.0
  description: |
    PubWiki Backend API
    
    ## 认证说明
    
    本 API 使用 [Better-Auth](https://www.better-auth.com/) 进行身份认证。
    
    **重要**: 认证相关的 API（注册、登录、会话管理等）不包含在此 OpenAPI 规范中。
    客户端应该使用 `better-auth/client` 库进行认证操作，而不是通过此处定义的 OpenAPI 客户端。
    
    ### 客户端认证示例
    
    ```typescript
    import { createAuthClient } from 'better-auth/client';
    
    const authClient = createAuthClient({
      baseURL: 'https://api.pubwiki.com',
    });
    
    // 注册
    await authClient.signUp.email({
      email: 'user@example.com',
      password: 'password123',
      name: 'User Name',
      username: 'username',
    });
    
    // 登录
    await authClient.signIn.email({
      email: 'user@example.com',
      password: 'password123',
    });
    
    // 获取会话
    const session = await authClient.getSession();
    ```
    
    认证成功后，Better-Auth 会自动设置 session cookie，后续请求会自动携带认证信息。

servers:
  - url: /api
    description: API base path

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: Better-Auth session cookie (由 better-auth/client 自动管理)

  schemas:
    # 错误响应
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: 错误信息

    # 用户公开信息
    PublicUser:
      type: object
      required:
        - id
        - username
        - email
        - isAdmin
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        location:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # 更新用户 Profile 的请求体
    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 100
        avatarUrl:
          type: string
          format: uri
          maxLength: 500
        bio:
          type: string
        website:
          type: string
          format: uri
          maxLength: 255
        location:
          type: string
          maxLength: 100

    # JWT Payload
    JwtPayload:
      type: object
      required:
        - sub
        - username
        - email
        - isAdmin
      properties:
        sub:
          type: string
          description: 用户 ID
        username:
          type: string
        email:
          type: string
        isAdmin:
          type: boolean
        iat:
          type: integer
          description: 签发时间
        exp:
          type: integer
          description: 过期时间

    # Artifact 类型
    ArtifactType:
      type: string
      enum: [RECIPE, GAME, ASSET_PACK, PROMPT]

    # Tag 信息
    Tag:
      type: object
      required:
        - id
        - name
        - slug
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
          description: "颜色代码 #RRGGBB"

    # 可见性类型
    VisibilityType:
      type: string
      enum: [PUBLIC, PRIVATE, UNLISTED]

    # Artifact Node 类型
    ArtifactNodeType:
      type: string
      enum: [PROMPT, INPUT, GENERATED, VFS, LOADER, SANDBOX, STATE]

    # 创建 Artifact 的元数据
    CreateArtifactMetadata:
      type: object
      required:
        - artifactId
        - type
        - name
        - slug
        - version
      properties:
        artifactId:
          type: string
          format: uuid
          description: |
            Artifact ID，必须是客户端生成的 UUID（使用 crypto.randomUUID()）。
            服务端会检查此 ID 是否已存在于数据库中：
            - 不存在：创建新 artifact
            - 存在且 owner 是当前用户：更新已有 artifact
            - 存在但 owner 不是当前用户：返回 403 Forbidden
        type:
          $ref: '#/components/schemas/ArtifactType'
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          description: URL-friendly 标识符
        description:
          type: string
        visibility:
          $ref: '#/components/schemas/VisibilityType'
          default: PUBLIC
        thumbnailUrl:
          type: string
          format: uri
          maxLength: 500
        license:
          type: string
          maxLength: 50
        repositoryUrl:
          type: string
          format: uri
          maxLength: 500
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+(-[a-zA-Z0-9]+)?$'
          description: Semver 版本号
        changelog:
          type: string
        isPrerelease:
          type: boolean
          default: false
        tags:
          type: array
          items:
            type: string
          description: Tag slugs 数组

    # Artifact Node Descriptor（用于创建 Artifact）
    ArtifactNodeDescriptor:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
        external:
          type: boolean
          default: false
        type:
          $ref: '#/components/schemas/ArtifactNodeType'
        name:
          type: string
        files:
          type: array
          items:
            type: string
          description: VFS 类型时的文件路径列表

    # Artifact Edge Descriptor（用于创建 Artifact）
    ArtifactEdgeDescriptor:
      type: object
      required:
        - source
        - target
      properties:
        source:
          type: string
          format: uuid
        target:
          type: string
          format: uuid
        sourceHandle:
          type: string
        targetHandle:
          type: string

    # Artifact Descriptor（pubwiki.artifact.json 格式）
    ArtifactDescriptor:
      type: object
      required:
        - version
        - exportedAt
        - nodes
        - edges
      properties:
        version:
          type: integer
        exportedAt:
          type: string
          format: date-time
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactNodeDescriptor'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactEdgeDescriptor'

    # 节点摘要（用于图列表）
    ArtifactNodeSummary:
      type: object
      required:
        - id
        - type
        - external
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ArtifactNodeType'
        name:
          type: string
          nullable: true
        external:
          type: boolean
        externalArtifactId:
          type: string
          format: uuid
          description: 外部引用时，被引用的 artifact ID

    # 边信息
    ArtifactEdge:
      type: object
      required:
        - source
        - target
      properties:
        source:
          type: string
          format: uuid
        target:
          type: string
          format: uuid
        sourceHandle:
          type: string
        targetHandle:
          type: string

    # 节点版本信息
    NodeVersionInfo:
      type: object
      required:
        - id
        - commitHash
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        commitHash:
          type: string
          description: SHA-256 前8位
        contentHash:
          type: string
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    # 节点文件信息
    NodeFileInfo:
      type: object
      required:
        - filepath
        - filename
      properties:
        filepath:
          type: string
        filename:
          type: string
        mimeType:
          type: string
          nullable: true
        sizeBytes:
          type: integer
          nullable: true

    # Artifact 版本
    ArtifactVersion:
      type: object
      required:
        - id
        - version
        - commitHash
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
        commitHash:
          type: string
          description: SHA-256 前8位
        changelog:
          type: string
          nullable: true
        isPrerelease:
          type: boolean
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # Lineage 类型
    LineageType:
      type: string
      enum: [DEPENDS_ON, FORKED_FROM, INSPIRED_BY, GENERATED_BY]

    # Artifact Lineage 项
    ArtifactLineageItem:
      type: object
      required:
        - id
        - lineageType
        - createdAt
        - artifact
      properties:
        id:
          type: string
          format: uuid
        lineageType:
          $ref: '#/components/schemas/LineageType'
        description:
          type: string
          nullable: true
        parentId:
          type: string
          format: uuid
          nullable: true
          description: 在父谱系中表示此节点的父节点ID，在子谱系中表示此节点的子节点来源ID（用于构建树结构）
        createdAt:
          type: string
          format: date-time
        artifact:
          type: object
          required:
            - id
            - name
            - slug
            - type
            - visibility
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            slug:
              type: string
            type:
              $ref: '#/components/schemas/ArtifactType'
            visibility:
              $ref: '#/components/schemas/VisibilityType'
            thumbnailUrl:
              type: string
              format: uri
              nullable: true
            author:
              type: object
              required:
                - id
                - username
              properties:
                id:
                  type: string
                  format: uuid
                username:
                  type: string
                displayName:
                  type: string
                  nullable: true
                avatarUrl:
                  type: string
                  format: uri
                  nullable: true

    # Artifact 列表项
    ArtifactListItem:
      type: object
      required:
        - id
        - type
        - name
        - slug
        - visibility
        - isArchived
        - createdAt
        - updatedAt
        - author
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ArtifactType'
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [PUBLIC, PRIVATE, UNLISTED]
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        license:
          type: string
          nullable: true
        isArchived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          type: object
          required:
            - id
            - username
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            displayName:
              type: string
              nullable: true
            avatarUrl:
              type: string
              format: uri
              nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        stats:
          type: object
          properties:
            viewCount:
              type: integer
            starCount:
              type: integer
            forkCount:
              type: integer
            downloadCount:
              type: integer

    # 分页信息
    Pagination:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
        totalPages:
          type: integer

    # Project 角色
    ProjectRole:
      type: object
      required:
        - id
        - name
        - isLeaf
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        parentRoleId:
          type: string
          format: uuid
          nullable: true
          description: 父角色 ID，用于构建角色树
        isLeaf:
          type: boolean
          description: 是否为叶子角色，只有叶子角色可以分配给 artifact
        createdAt:
          type: string
          format: date-time

    # 创建 Project 角色的输入
    CreateProjectRole:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 角色名称，在同一 project 内必须唯一，同时作为角色标识符
        description:
          type: string
        parentName:
          type: string
          nullable: true
          description: 父角色的名称

    # 创建 Project Artifact 关联的输入
    CreateProjectArtifact:
      type: object
      required:
        - artifactId
        - roleName
      properties:
        artifactId:
          type: string
          format: uuid
          description: 要关联的 Artifact ID
        roleName:
          type: string
          description: 角色名称（必须是叶子角色）

    # 创建 Project 的元数据
    CreateProjectMetadata:
      type: object
      required:
        - name
        - slug
        - topic
        - roles
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          description: URL-friendly 标识符
        topic:
          type: string
          minLength: 1
          maxLength: 100
          description: Project 的 hashtag
        description:
          type: string
        visibility:
          $ref: '#/components/schemas/VisibilityType'
          default: PUBLIC
        license:
          type: string
          maxLength: 50
        coverUrls:
          type: array
          items:
            type: string
            format: uri
          description: 封面图片 URL 数组
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/CreateProjectArtifact'
          description: 要关联的 artifact 列表（创建时 isOfficial 自动设为 true）
        roles:
          type: array
          items:
            $ref: '#/components/schemas/CreateProjectRole'
          minItems: 1
          description: 要创建的角色列表，角色名称必须唯一，支持树状结构，至少需要一个角色
        pages:
          type: array
          items:
            $ref: '#/components/schemas/CreateProjectPage'
          description: 要创建的页面列表
        homepageIndex:
          type: integer
          minimum: 0
          description: 首页在 pages 数组中的索引，不提供则不设置首页

    # 创建 Project 页面的输入
    CreateProjectPage:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: 页面名称
        icon:
          type: string
          maxLength: 50
          description: 页面图标（emoji 或图标标识符）
        content:
          type: string
          description: 页面 HTML 内容

    # Project 页面信息
    ProjectPage:
      type: object
      required:
        - id
        - name
        - order
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
          nullable: true
          description: 页面图标（emoji 或图标标识符）
        order:
          type: integer
          description: 显示顺序
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Project 页面详情（包含内容）
    ProjectPageDetail:
      type: object
      required:
        - id
        - name
        - order
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
          nullable: true
          description: 页面图标（emoji 或图标标识符）
        content:
          type: string
          nullable: true
          description: 页面 HTML 内容
        order:
          type: integer
          description: 显示顺序
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Project 列表项
    ProjectListItem:
      type: object
      required:
        - id
        - name
        - topic
        - visibility
        - createdAt
        - updatedAt
        - owner
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        topic:
          type: string
          description: Project 的 hashtag
        description:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        coverUrls:
          type: array
          items:
            type: string
            format: uri
          description: 封面图片 URL 数组
        visibility:
          $ref: '#/components/schemas/VisibilityType'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        owner:
          type: object
          required:
            - id
            - username
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            displayName:
              type: string
              nullable: true
            avatarUrl:
              type: string
              format: uri
              nullable: true
        maintainerCount:
          type: integer
          description: 管理者数量
        artifactCount:
          type: integer
          description: 关联 artifact 数量

    # 用户角色类型
    UserProjectRole:
      type: string
      enum: [owner, maintainer]
      description: 用户在 Project 中的角色

    # 用户的 Project 列表项（包含角色信息）
    UserProjectListItem:
      type: object
      required:
        - id
        - name
        - topic
        - visibility
        - createdAt
        - updatedAt
        - owner
        - role
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        topic:
          type: string
          description: Project 的 hashtag
        description:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        coverUrls:
          type: array
          items:
            type: string
            format: uri
          description: 封面图片 URL 数组
        visibility:
          $ref: '#/components/schemas/VisibilityType'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        owner:
          type: object
          required:
            - id
            - username
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            displayName:
              type: string
              nullable: true
            avatarUrl:
              type: string
              format: uri
              nullable: true
        maintainerCount:
          type: integer
          description: 管理者数量
        artifactCount:
          type: integer
          description: 关联 artifact 数量
        role:
          $ref: '#/components/schemas/UserProjectRole'

    # Project 关联的 Artifact（带角色信息）
    ProjectArtifact:
      type: object
      required:
        - artifact
        - isOfficial
        - createdAt
      properties:
        artifact:
          $ref: '#/components/schemas/ArtifactListItem'
        role:
          $ref: '#/components/schemas/ProjectRole'
        isOfficial:
          type: boolean
          description: 是否为官方添加的 artifact
        createdAt:
          type: string
          format: date-time
          description: 关联创建时间

    # Project 详情
    ProjectDetail:
      type: object
      required:
        - id
        - name
        - slug
        - topic
        - visibility
        - isArchived
        - createdAt
        - updatedAt
        - owner
        - maintainers
        - artifacts
        - roles
        - pages
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        topic:
          type: string
          description: Project 的 hashtag
        description:
          type: string
          nullable: true
        license:
          type: string
          nullable: true
        coverUrls:
          type: array
          items:
            type: string
            format: uri
          description: 封面图片 URL 数组
        visibility:
          $ref: '#/components/schemas/VisibilityType'
        isArchived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        owner:
          type: object
          required:
            - id
            - username
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            displayName:
              type: string
              nullable: true
            avatarUrl:
              type: string
              format: uri
              nullable: true
        maintainers:
          type: array
          description: 管理者列表
          items:
            type: object
            required:
              - id
              - username
            properties:
              id:
                type: string
                format: uuid
              username:
                type: string
              displayName:
                type: string
                nullable: true
              avatarUrl:
                type: string
                format: uri
                nullable: true
        artifacts:
          type: array
          description: 关联的 artifact 列表
          items:
            $ref: '#/components/schemas/ProjectArtifact'
        roles:
          type: array
          description: Project 定义的角色列表
          items:
            $ref: '#/components/schemas/ProjectRole'
        pages:
          type: array
          description: Project 页面列表（不含内容）
          items:
            $ref: '#/components/schemas/ProjectPage'
        homepageId:
          type: string
          format: uuid
          nullable: true
          description: 主页 ID

    # ========== 动态 (Posts) 相关 ==========

    # 动态作者信息
    PostAuthor:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true

    # 动态列表项
    PostListItem:
      type: object
      required:
        - id
        - projectId
        - author
        - title
        - content
        - isPinned
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        author:
          $ref: '#/components/schemas/PostAuthor'
        discussionId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          maxLength: 200
        content:
          type: string
          description: HTML 内容
        coverUrls:
          type: array
          items:
            type: string
            format: uri
          description: 封面图片 URL 数组
          nullable: true
        isPinned:
          type: boolean
        replyCount:
          type: integer
          description: 关联讨论的回复数
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # 动态详情
    PostDetail:
      allOf:
        - $ref: '#/components/schemas/PostListItem'
        - type: object
          properties:
            discussion:
              $ref: '#/components/schemas/DiscussionDetail'
              nullable: true

    # 创建动态请求
    CreatePostRequest:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          description: HTML 内容
        coverUrls:
          type: array
          items:
            type: string
            format: uri
          description: 封面图片 URL 数组

    # 更新动态请求
    UpdatePostRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          description: HTML 内容
        coverUrls:
          type: array
          items:
            type: string
            format: uri
          description: 封面图片 URL 数组
        isPinned:
          type: boolean
          description: 是否置顶（仅 owner 和 maintainer 可设置）

    # ========== 讨论区相关 ==========

    # 讨论目标类型
    DiscussionTargetType:
      type: string
      enum: [ARTIFACT, PROJECT, POST]
      description: 讨论可以关联到的目标类型

    # 讨论分类
    DiscussionCategory:
      type: string
      enum: [QUESTION, FEEDBACK, BUG_REPORT, FEATURE_REQUEST, GENERAL]
      description: 讨论分类

    # 讨论作者信息
    DiscussionAuthor:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri

    # 讨论列表项
    DiscussionListItem:
      type: object
      required:
        - id
        - targetType
        - targetId
        - author
        - content
        - category
        - isPinned
        - isLocked
        - replyCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        targetType:
          $ref: '#/components/schemas/DiscussionTargetType'
        targetId:
          type: string
          format: uuid
        author:
          $ref: '#/components/schemas/DiscussionAuthor'
        title:
          type: string
          maxLength: 200
        content:
          type: string
        category:
          $ref: '#/components/schemas/DiscussionCategory'
        isPinned:
          type: boolean
        isLocked:
          type: boolean
        replyCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # 讨论详情
    DiscussionDetail:
      allOf:
        - $ref: '#/components/schemas/DiscussionListItem'

    # 讨论回复项
    DiscussionReplyItem:
      type: object
      required:
        - id
        - discussionId
        - author
        - content
        - isAccepted
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        discussionId:
          type: string
          format: uuid
        author:
          $ref: '#/components/schemas/DiscussionAuthor'
        parentReplyId:
          type: string
          format: uuid
          description: 父回复 ID，用于嵌套回复
        content:
          type: string
        isAccepted:
          type: boolean
          description: 是否被采纳为答案
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # 创建讨论请求
    CreateDiscussionRequest:
      type: object
      required:
        - content
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
          minLength: 1
        category:
          $ref: '#/components/schemas/DiscussionCategory'

    # 更新讨论请求
    UpdateDiscussionRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
          minLength: 1
        category:
          $ref: '#/components/schemas/DiscussionCategory'

    # 创建回复请求
    CreateDiscussionReplyRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
        parentReplyId:
          type: string
          format: uuid
          description: 父回复 ID，用于嵌套回复

    # ========== Article 相关类型 ==========

    # Content Block 类型
    TextContent:
      type: object
      required:
        - type
        - id
        - text
      properties:
        type:
          type: string
          enum: [text]
        id:
          type: string
          description: 文本块唯一标识符
        text:
          type: string
          description: 文本内容（支持 markdown heading）

    GameRef:
      type: object
      required:
        - type
        - textId
        - ref
      properties:
        type:
          type: string
          enum: [game_ref]
        textId:
          type: string
          description: 关联的文本块 ID
        ref:
          type: string
          description: 游戏状态引用（存档标识）

    ReaderContentBlock:
      oneOf:
        - $ref: '#/components/schemas/TextContent'
        - $ref: '#/components/schemas/GameRef'
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/TextContent'
          game_ref: '#/components/schemas/GameRef'

    # 文章作者信息
    ArticleAuthor:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true

    # 文章详情
    ArticleDetail:
      type: object
      required:
        - id
        - title
        - content
        - author
        - sandboxNodeId
        - artifactId
        - visibility
        - likes
        - collections
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: array
          items:
            $ref: '#/components/schemas/ReaderContentBlock'
        author:
          $ref: '#/components/schemas/ArticleAuthor'
        sandboxNodeId:
          type: string
          format: uuid
          description: Sandbox 节点 ID
        artifactId:
          type: string
          format: uuid
          description: Artifact ID（通过 sandboxNodeId 获取）
        visibility:
          $ref: '#/components/schemas/VisibilityType'
        likes:
          type: integer
        collections:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # 创建/更新文章请求
    UpsertArticleRequest:
      type: object
      required:
        - title
        - sandboxNodeId
        - content
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        sandboxNodeId:
          type: string
          format: uuid
          description: Sandbox 节点 ID（用于游戏回放）
        content:
          type: array
          items:
            $ref: '#/components/schemas/ReaderContentBlock'
        visibility:
          $ref: '#/components/schemas/VisibilityType'
          default: PUBLIC

paths:
  /:
    get:
      summary: 健康检查
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: API 正常运行
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - version
                properties:
                  message:
                    type: string
                    example: PubWiki API is running
                  version:
                    type: string
                    example: '1.0.0'

  /auth/register:
    post:
      summary: 用户注册 (已废弃)
      description: |
        **已废弃**: 请使用 better-auth/client 进行注册。
        
        ```typescript
        import { createAuthClient } from 'better-auth/client';
        const authClient = createAuthClient({ baseURL: 'https://api.pubwiki.com' });
        await authClient.signUp.email({ email, password, name, username });
        ```
      deprecated: true
      operationId: register
      tags:
        - Auth (Deprecated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 50
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                displayName:
                  type: string
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - user
                  - token
                properties:
                  message:
                    type: string
                    example: Registration successful
                  user:
                    $ref: '#/components/schemas/PublicUser'
                  token:
                    type: string
                    description: JWT token
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: 用户已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/login:
    post:
      summary: 用户登录 (已废弃)
      description: |
        **已废弃**: 请使用 better-auth/client 进行登录。
        
        ```typescript
        import { createAuthClient } from 'better-auth/client';
        const authClient = createAuthClient({ baseURL: 'https://api.pubwiki.com' });
        await authClient.signIn.email({ email, password });
        ```
      deprecated: true
      operationId: login
      tags:
        - Auth (Deprecated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - usernameOrEmail
                - password
              properties:
                usernameOrEmail:
                  type: string
                  description: 用户名或邮箱
                password:
                  type: string
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - user
                  - token
                properties:
                  message:
                    type: string
                    example: Login successful
                  user:
                    $ref: '#/components/schemas/PublicUser'
                  token:
                    type: string
                    description: JWT token
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /me:
    get:
      summary: 获取当前用户信息
      description: 需要通过 Better-Auth session cookie 认证。使用 better-auth/client 登录后会自动设置 cookie。
      operationId: getMe
      tags:
        - User
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 成功获取用户信息
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: '#/components/schemas/PublicUser'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    patch:
      summary: 更新当前用户 Profile
      operationId: updateProfile
      tags:
        - User
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - user
                properties:
                  message:
                    type: string
                    example: Profile updated successfully
                  user:
                    $ref: '#/components/schemas/PublicUser'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /artifacts:
    get:
      summary: 获取公开 Artifact 列表
      description: 获取所有公开的 Artifact，支持按类型和标签过滤，支持排序
      operationId: listArtifacts
      tags:
        - Artifacts
      parameters:
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: 每页数量
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: type.include
          in: query
          description: 包含的类型列表
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ArtifactType'
          style: form
          explode: true
        - name: type.exclude
          in: query
          description: 排除的类型列表
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ArtifactType'
          style: form
          explode: true
        - name: tag.include
          in: query
          description: 包含的标签 slug 列表（AND 逻辑）
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: tag.exclude
          in: query
          description: 排除的标签 slug 列表
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: sortBy
          in: query
          description: 排序字段
          schema:
            type: string
            enum: [createdAt, updatedAt, viewCount, starCount]
            default: createdAt
        - name: sortOrder
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 成功获取 Artifact 列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - artifacts
                  - pagination
                properties:
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArtifactListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    post:
      summary: 创建或更新 Artifact
      description: |
        创建新的 Artifact 或更新已存在的 Artifact，支持同时上传多个节点文件。
        
        **更新模式：** 如果 metadata 中包含 artifactId 字段，则为更新操作：
        - 验证 artifact 是否存在且 owner 是当前用户
        - 覆写之前的数据
        
        使用 multipart/form-data 格式：
        - metadata 字段包含 JSON 格式的 artifact 基本信息
        - descriptor 字段包含 JSON 格式的 pubwiki.artifact.json 内容（节点和边定义）
        - nodes[{node_id}] 字段包含各节点对应的文件
      operationId: createArtifact
      tags:
        - Artifacts
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - metadata
                - descriptor
              properties:
                metadata:
                  type: string
                  description: |
                    JSON 格式的 artifact 元数据，包含以下字段：
                    - artifactId: string (可选，如提供则为更新模式)
                    - type: ArtifactType (必填)
                    - name: string (必填)
                    - slug: string (必填)
                    - description: string (可选)
                    - visibility: VisibilityType (可选，默认 PUBLIC)
                    - thumbnailUrl: string (可选)
                    - license: string (可选)
                    - repositoryUrl: string (可选)
                    - version: string (必填，semver 格式如 1.0.0)
                    - changelog: string (可选)
                    - isPrerelease: boolean (可选，默认 false)
                    - tags: string[] (可选，tag slugs 数组)
                homepage:
                  type: string
                  format: binary
                  description: |
                    可选的主页 Markdown 文件，将被渲染为 HTML 后存储。
                descriptor:
                  type: string
                  description: |
                    JSON 格式的 pubwiki.artifact.json 内容，包含：
                    - version: number (descriptor 格式版本)
                    - exportedAt: string (ISO 时间戳)
                    - nodes: ArtifactNodeDescriptor[] (节点列表)
                    - edges: ArtifactEdgeDescriptor[] (节点间关系)
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - artifact
                properties:
                  message:
                    type: string
                    example: Artifact created successfully
                  artifact:
                    $ref: '#/components/schemas/ArtifactListItem'
        '200':
          description: 更新成功（当 metadata.artifactId 存在时）
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - artifact
                properties:
                  message:
                    type: string
                    example: Artifact updated successfully
                  artifact:
                    $ref: '#/components/schemas/ArtifactListItem'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: 无权限更新该 artifact（不是 owner）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: 指定的 artifactId 不存在（更新模式）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Slug 已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /artifacts/{artifactId}/homepage:
    get:
      summary: 获取 Artifact 主页 HTML
      description: |
        获取指定 Artifact 的只读主页 HTML 内容。
        HTML 内容存储在 R2 中，存储 key 由 artifactId 派生。
        - PUBLIC artifact: 所有人可访问
        - UNLISTED artifact: 仅注册用户可访问
        - PRIVATE artifact: 仅 owner 可访问
      operationId: getArtifactHomepage
      tags:
        - Artifacts
      parameters:
        - name: artifactId
          in: path
          required: true
          description: Artifact ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功获取主页 HTML
          content:
            text/html:
              schema:
                type: string
                description: Artifact 主页的 HTML 内容
        '401':
          description: 需要认证（访问 UNLISTED artifact 时）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: 无权访问（访问 PRIVATE artifact 时）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Artifact 不存在或主页未创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /artifacts/{artifactId}/lineage:
    get:
      summary: 获取 Artifact 的谱系信息
      description: |
        获取指定 Artifact 的谱系（依赖和派生关系）。
        支持递归查询多代父/子关系，可通过 parentDepth 和 childDepth 控制递归深度。
        返回的每个条目包含 parentId 字段，用于在前端构建树状结构。
        - PUBLIC artifact: 所有人可访问
        - UNLISTED artifact: 仅注册用户可访问
        - PRIVATE artifact: 仅 owner 可访问
      operationId: getArtifactLineage
      tags:
        - Artifacts
      parameters:
        - name: artifactId
          in: path
          required: true
          description: Artifact ID
          schema:
            type: string
            format: uuid
        - name: parentDepth
          in: query
          required: false
          description: 向上追溯父代的深度（1=直接父代，2=父代+祖父代...）。不指定则无限递归。
          schema:
            type: integer
            minimum: 1
        - name: childDepth
          in: query
          required: false
          description: 向下追溯子代的深度（1=直接子代，2=子代+孙代...）。不指定则无限递归。
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: 成功获取谱系信息
          content:
            application/json:
              schema:
                type: object
                required:
                  - parents
                  - children
                properties:
                  parents:
                    type: array
                    description: 此 Artifact 依赖的父 Artifact
                    items:
                      $ref: '#/components/schemas/ArtifactLineageItem'
                  children:
                    type: array
                    description: 依赖此 Artifact 的子 Artifact
                    items:
                      $ref: '#/components/schemas/ArtifactLineageItem'
        '401':
          description: 需要认证（访问 UNLISTED artifact 时）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: 无权访问（访问 PRIVATE artifact 时）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Artifact 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /artifacts/{artifactId}/graph:
    get:
      summary: 获取 Artifact 节点图结构
      description: |
        获取 artifact 的完整节点和边列表。
        - PUBLIC artifact: 所有人可访问
        - UNLISTED artifact: 仅注册用户可访问
        - PRIVATE artifact: 仅 owner 可访问
      operationId: getArtifactGraph
      tags:
        - Nodes
      parameters:
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: version
          in: query
          schema:
            type: string
            default: latest
          description: artifact 版本哈希或 "latest"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - nodes
                  - edges
                  - version
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArtifactNodeSummary'
                  edges:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArtifactEdge'
                  version:
                    type: object
                    required:
                      - id
                      - commitHash
                      - version
                      - createdAt
                    properties:
                      id:
                        type: string
                        format: uuid
                      commitHash:
                        type: string
                      version:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
        '401':
          description: 需要认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: 无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Artifact 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /artifacts/{artifactId}/nodes/{nodeId}:
    get:
      summary: 获取节点详情
      description: |
        获取单个节点的详细信息（不含文件内容）。
        - PUBLIC artifact: 所有人可访问
        - UNLISTED artifact: 仅注册用户可访问
        - PRIVATE artifact: 仅 owner 可访问
      operationId: getNodeDetail
      tags:
        - Nodes
      parameters:
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: version
          in: query
          schema:
            type: string
            default: latest
          description: node 版本哈希或 "latest"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - type
                  - external
                  - version
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    $ref: '#/components/schemas/ArtifactNodeType'
                  name:
                    type: string
                    nullable: true
                  external:
                    type: boolean
                  externalArtifact:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      slug:
                        type: string
                      author:
                        type: object
                        required:
                          - id
                          - username
                        properties:
                          id:
                            type: string
                            format: uuid
                          username:
                            type: string
                  version:
                    $ref: '#/components/schemas/NodeVersionInfo'
                  files:
                    type: array
                    items:
                      $ref: '#/components/schemas/NodeFileInfo'
                    description: VFS 类型时包含文件路径列表
        '401':
          description: 需要认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: 无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Node 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /artifacts/{artifactId}/nodes/{nodeId}/content:
