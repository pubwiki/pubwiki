openapi: 3.1.0
info:
  title: PubWiki API
  version: 1.0.0
  description: |
    PubWiki Backend API
    
    ## 认证说明
    
    本 API 使用 [Better-Auth](https://www.better-auth.com/) 进行身份认证。
    
    **重要**: 认证相关的 API（注册、登录、会话管理等）不包含在此 OpenAPI 规范中。
    客户端应该使用 `better-auth/client` 库进行认证操作，而不是通过此处定义的 OpenAPI 客户端。
    
    ### 客户端认证示例
    
    ```typescript
    import { createAuthClient } from 'better-auth/client';
    
    const authClient = createAuthClient({
      baseURL: 'https://api.pubwiki.com',
    });
    
    // 注册
    await authClient.signUp.email({
      email: 'user@example.com',
      password: 'password123',
      name: 'User Name',
      username: 'username',
    });
    
    // 登录
    await authClient.signIn.email({
      email: 'user@example.com',
      password: 'password123',
    });
    
    // 获取会话
    const session = await authClient.getSession();
    ```
    
    认证成功后，Better-Auth 会自动设置 session cookie，后续请求会自动携带认证信息。

servers:
  - url: /api
    description: API base path

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: Better-Auth session cookie (由 better-auth/client 自动管理)

