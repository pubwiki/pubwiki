            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 成功获取用户 Artifact 列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - artifacts
                  - pagination
                properties:
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArtifactListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/{userId}/projects:
    get:
      summary: 获取用户的 Project 列表
      description: |
        获取指定用户 own 或 maintain 的所有 Project。
        返回的每个 project 都包含用户在其中的角色（owner 或 maintainer）。
        - 未认证用户：只能看到 PUBLIC project
        - 已认证用户查看他人：只能看到 PUBLIC 和 UNLISTED project
        - 已认证用户查看自己：可以看到所有 project
      operationId: getUserProjects
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: 用户 ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: 每页数量
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: role
          in: query
          description: 按用户角色过滤（owner 或 maintainer）
          schema:
            type: string
            enum: [owner, maintainer]
        - name: sortBy
          in: query
          description: 排序字段
          schema:
            type: string
            enum: [createdAt, updatedAt]
            default: createdAt
        - name: sortOrder
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 成功获取用户 Project 列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - projects
                  - pagination
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProjectListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ========== 讨论区 API ==========

  /discussions:
    get:
      summary: 获取讨论列表
      description: |
        获取指定目标（Artifact 或 Project）的讨论列表。
        必须指定 targetType 和 targetId。
      operationId: listDiscussions
      tags:
        - Discussions
      parameters:
        - name: targetType
          in: query
          required: true
          description: 目标类型
          schema:
            $ref: '#/components/schemas/DiscussionTargetType'
        - name: targetId
          in: query
          required: true
          description: 目标 ID
          schema:
            type: string
            format: uuid
        - name: category
          in: query
          description: 按分类筛选
          schema:
            $ref: '#/components/schemas/DiscussionCategory'
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: 每页数量
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: 排序字段
          schema:
            type: string
            enum: [createdAt, updatedAt, replyCount]
            default: createdAt
        - name: sortOrder
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 成功获取讨论列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - discussions
                  - pagination
                properties:
                  discussions:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscussionListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    post:
      summary: 创建讨论
      description: |
        在指定目标上创建新讨论。需要认证。
      operationId: createDiscussion
      tags:
        - Discussions
      security:
        - cookieAuth: []
      parameters:
        - name: targetType
          in: query
          required: true
          description: 目标类型
          schema:
            $ref: '#/components/schemas/DiscussionTargetType'
        - name: targetId
          in: query
          required: true
          description: 目标 ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDiscussionRequest'
      responses:
        '201':
          description: 成功创建讨论
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - discussion
                properties:
                  message:
                    type: string
                  discussion:
                    $ref: '#/components/schemas/DiscussionDetail'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

