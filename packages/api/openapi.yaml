  # Articles API
  /articles/{articleId}:
    get:
      operationId: getArticle
      summary: 获取文章详情
      description: |
        获取文章详情，包括内容和元数据。
        返回值中包含 artifactId（通过 sandboxNodeId 获取）。
      tags: [Articles]
      parameters:
        - name: articleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 文章详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetail'
        '404':
          description: 文章不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    put:
      operationId: upsertArticle
      summary: 创建或更新文章
      description: |
        创建或更新文章（upsert 语义）。
        - 如果 articleId 不存在，创建新文章
        - 如果 articleId 存在且 author 是当前用户，更新文章
        - 如果 articleId 存在但 author 不是当前用户，返回 403
      tags: [Articles]
      security:
        - cookieAuth: []
      parameters:
        - name: articleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertArticleRequest'
      responses:
        '200':
          description: 文章创建/更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetail'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: 无权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

