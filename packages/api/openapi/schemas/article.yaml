# Article-related schemas

TextContent:
  type: object
  required:
    - type
    - id
    - text
  properties:
    type:
      type: string
      enum: [text]
    id:
      type: string
      description: 文本块唯一标识符
    text:
      type: string
      description: 文本内容（支持 markdown heading）

GameRef:
  type: object
  required:
    - type
    - textId
    - saveCommit
  properties:
    type:
      type: string
      enum: [game_ref]
    textId:
      type: string
      description: 关联的文本块 ID
    saveCommit:
      type: string
      description: Save 版本 commit hash（可唯一索引到对应的 save node version）

ReaderContentBlock:
  oneOf:
    - $ref: './article.yaml#/TextContent'
    - $ref: './article.yaml#/GameRef'
  discriminator:
    propertyName: type
    mapping:
      text: './article.yaml#/TextContent'
      game_ref: './article.yaml#/GameRef'

ArticleAuthor:
  type: object
  required:
    - id
    - username
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    displayName:
      type: string
      nullable: true
    avatarUrl:
      type: string
      format: uri
      nullable: true

ArticleDetail:
  type: object
  required:
    - id
    - title
    - content
    - author
    - artifactId
    - artifactCommit
    - isListed
    - likes
    - collections
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      format: uuid
    title:
      type: string
    content:
      type: array
      items:
        $ref: './article.yaml#/ReaderContentBlock'
    author:
      $ref: './article.yaml#/ArticleAuthor'
    artifactId:
      type: string
      format: uuid
      description: Artifact ID
    artifactCommit:
      type: string
      description: Artifact 版本 commit hash
    isListed:
      type: boolean
      description: 是否在公开列表中可见（可发现性）
    likes:
      type: integer
    collections:
      type: integer
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

UpsertArticleRequest:
  type: object
  required:
    - title
    - artifactId
    - artifactCommit
    - content
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 200
    artifactId:
      type: string
      format: uuid
      description: Artifact ID
    artifactCommit:
      type: string
      description: Artifact 版本 commit hash
    content:
      type: array
      items:
        $ref: './article.yaml#/ReaderContentBlock'
    isListed:
      type: boolean
      default: false
      description: 是否在公开列表中可见（可发现性）
    isPrivate:
      type: boolean
      default: false
      description: 是否为私有文章（访问控制）。如果设为 false（公开），对应的 artifact 必须也是公开的。
