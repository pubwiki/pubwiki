ProjectArtifact:
  type: object
  required:
    - artifact
    - isOfficial
    - createdAt
  properties:
    artifact:
      $ref: './artifact.yaml#/ArtifactListItem'
    role:
      $ref: './project.yaml#/ProjectRole'
    isOfficial:
      type: boolean
      description: 是否为官方添加的 artifact
    createdAt:
      type: string
      format: date-time
      description: 关联创建时间

ProjectDetail:
  type: object
  required:
    - id
    - name
    - slug
    - topic
    - isListed
    - isArchived
    - createdAt
    - updatedAt
    - owner
    - artifacts
    - roles
    - pages
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    slug:
      type: string
    topic:
      type: string
      description: Project 的 hashtag
    description:
      type: string
      nullable: true
    license:
      type: string
      nullable: true
    coverUrls:
      type: array
      items:
        type: string
        format: uri
      description: 封面图片 URL 数组
    isListed:
      type: boolean
      description: 是否在公开列表中可见（可发现性）
    isArchived:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    owner:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true
    artifacts:
      type: array
      description: 关联的 artifact 列表
      items:
        $ref: './project.yaml#/ProjectArtifact'
    roles:
      type: array
      description: Project 定义的角色列表
      items:
        $ref: './project.yaml#/ProjectRole'
    pages:
      type: array
      description: Project 页面列表（不含内容）
      items:
        $ref: './project.yaml#/ProjectPage'
    homepageId:
      type: string
      format: uuid
      nullable: true
      description: 主页 ID
