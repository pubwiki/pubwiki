# Artifact-related schemas

# ============================================================================
# 通用枚举和排序类型
# ============================================================================

ArtifactSortBy:
  type: string
  description: Artifact 列表排序字段
  enum: [createdAt, updatedAt, viewCount, favCount]
  default: createdAt

ProjectSortBy:
  type: string
  description: Project 列表排序字段
  enum: [createdAt, updatedAt]
  default: createdAt

DiscussionSortBy:
  type: string
  description: Discussion 列表排序字段
  enum: [createdAt, updatedAt, replyCount]
  default: createdAt

SortOrder:
  type: string
  description: 排序方向
  enum: [asc, desc]
  default: desc

# ============================================================================
# 统计类型
# ============================================================================

ArtifactStats:
  type: object
  description: Artifact 统计信息
  properties:
    viewCount:
      type: integer
      description: 浏览次数
    favCount:
      type: integer
      description: 收藏次数
    refCount:
      type: integer
      description: 引用次数（被 fork 次数）
    downloadCount:
      type: integer
      description: 下载次数

# ============================================================================
# 基础类型
# ============================================================================

Tag:
  type: object
  required:
    - id
    - name
    - slug
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    slug:
      type: string
    description:
      type: string
      nullable: true
    color:
      type: string
      nullable: true
      description: "颜色代码 #RRGGBB"

ArtifactNodeType:
  type: string
  enum: [PROMPT, INPUT, GENERATED, VFS, LOADER, SANDBOX, STATE]

CreateArtifactMetadata:
  type: object
  required:
    - artifactId
    - commit
    - name
  properties:
    artifactId:
      type: string
      format: uuid
      description: |
        Artifact ID，必须是客户端生成的 UUID（使用 crypto.randomUUID()）。
        服务端会检查此 ID 是否已存在于数据库中：
        - 不存在：创建新 artifact
        - 存在且 owner 是当前用户：更新已有 artifact
        - 存在但 owner 不是当前用户：返回 403 Forbidden
    commit:
      type: string
      description: |
        Artifact version 的 commit hash，由客户端基于内容确定性计算。
        客户端应对 (artifactId + parentCommit + sorted nodes + sorted edges) 取 hash。
        通过包含 artifactId 和 parentCommit 形成链状结构，保证全局唯一性。
    parentCommit:
      type: string
      nullable: true
      description: |
        上一个版本的 commit hash，用于形成链状结构保证 commit 全局唯一性。
        创建新 artifact 时为 null，更新已有 artifact 时为当前版本的 commit hash。
        客户端在计算 commit 时必须包含此字段。
    name:
      type: string
      minLength: 1
      maxLength: 100
    description:
      type: string
    isListed:
      type: boolean
      default: true
      description: 是否在公开列表中可见（可发现性）
    thumbnailUrl:
      type: string
      format: uri
      maxLength: 500
    license:
      type: string
      maxLength: 50
    repositoryUrl:
      type: string
      format: uri
      maxLength: 500
    version:
      type: string
      pattern: '^\d+\.\d+\.\d+(-[a-zA-Z0-9]+)?$'
      description: Semver 版本号
    changelog:
      type: string
    tags:
      type: array
      items:
        type: string
      description: Tag slugs 数组
    entrypoint:
      $ref: './artifact.yaml#/ArtifactEntrypoint'
      description: 可选入口点，指定启动流图时的初始程序状态
    commitTags:
      type: array
      items:
        type: string
      description: |
        用户可分配的版本标签列表（如 ["stable", "beta", "v1.0"]）。
        同一 artifact 内每个 tag 唯一，一个 commit 可以有多个 tag。
        如果某个 tag 已被其他 commit 使用，则自动从旧 commit 上移除（override 语义）。
    saves:
      type: array
      items:
        $ref: './artifact.yaml#/CreateSaveInput'
      description: |
        和 artifact 同时创建的 save 列表（解决 save 和 artifact 的循环依赖）。
        Save 的二进制数据通过 save[{commit}] 形式在 multipart form 中上传。
        服务端会先创建 save，然后再验证 STATE 节点内容的合法性。

ArtifactEntrypoint:
  type: object
  required:
    - saveCommit
    - sandboxNodeId
  properties:
    saveCommit:
      type: string
      description: Save 的 commit hash，指定启动时加载的存档
    sandboxNodeId:
      type: string
      format: uuid
      description: 沙箱节点 ID

CreateSaveInput:
  type: object
  description: |
    和 artifact 一起创建的 save 数据。
    服务端会从 artifact 的 nodes 数组中自动获取 stateNodeCommit，
    并使用 artifact 的 commit 作为 sourceArtifactCommit。
  required:
    - stateNodeId
    - commit
    - contentHash
  properties:
    stateNodeId:
      type: string
      format: uuid
      description: 关联的 STATE 节点 ID
    commit:
      type: string
      description: Save 版本的 commit hash
    contentHash:
      type: string
      description: Save 内容的指纹
    parent:
      type: string
      nullable: true
      description: 父 save 的 commit hash
    title:
      type: string
      description: Save 标题
    description:
      type: string
      description: Save 描述
    isListed:
      type: boolean
      default: false
      description: 是否在公开列表中可见（可发现性）

ArtifactEdgeDescriptor:
  type: object
  required:
    - source
    - target
  properties:
    source:
      type: string
      format: uuid
    target:
      type: string
      format: uuid
    sourceHandle:
      type: string
    targetHandle:
      type: string

# ============================================================================
# Create Artifact API 专用类型
# ============================================================================

CreateArtifactNode:
  type: object
  description: |
    完整的 node version 数据，用于在创建 artifact 时一并同步节点版本。
    所有节点的版本数据将通过 artifact 创建接口一次性提交。
  required:
    - nodeId
    - commit
    - type
    - contentHash
    - content
  properties:
    nodeId:
      type: string
      format: uuid
      description: 节点 ID
    commit:
      type: string
      description: 版本 hash
    parent:
      type: string
      nullable: true
      description: 父版本 commit hash
    type:
      $ref: './artifact.yaml#/ArtifactNodeType'
    name:
      type: string
    contentHash:
      type: string
      description: 内容指纹
    content:
      $ref: './node-content.yaml#/ArtifactNodeContent'
      description: 节点内容（结构取决于 type）
    message:
      type: string
      description: Commit 消息
    tag:
      type: string
      description: Semver 标签
    isListed:
      type: boolean
      description: 是否在公开列表中可见（可发现性）
    refs:
      type: array
      description: 血统引用（主要用于 GENERATED 节点）
      items:
        $ref: '../schemas/node-version.yaml#/NodeVersionRef'
    position:
      type: object
      properties:
        x:
          type: integer
        y:
          type: integer

ArtifactNodeSummary:
  type: object
  required:
    - id
    - type
    - commit
    - contentHash
  properties:
    id:
      type: string
      format: uuid
    type:
      $ref: './artifact.yaml#/ArtifactNodeType'
    commit:
      type: string
      description: 节点版本的 commit hash
    contentHash:
      type: string
      description: 节点内容的指纹
    name:
      type: string
      nullable: true
    position:
      type: object
      properties:
        x:
          type: integer
        y:
          type: integer
    content:
      $ref: './node-content.yaml#/ArtifactNodeContent'
      description: 节点内容（结构化数据）

ArtifactEdge:
  type: object
  required:
    - source
    - target
  properties:
    source:
      type: string
      format: uuid
    target:
      type: string
      format: uuid
    sourceHandle:
      type: string
    targetHandle:
      type: string

NodeFileInfo:
  type: object
  required:
    - filepath
    - filename
  properties:
    filepath:
      type: string
    filename:
      type: string
    mimeType:
      type: string
      nullable: true
    sizeBytes:
      type: integer
      nullable: true

ArtifactVersion:
  type: object
  required:
    - id
    - version
    - commitHash
    - createdAt
  properties:
    id:
      type: string
      format: uuid
    version:
      type: string
    commitHash:
      type: string
      description: SHA-256 前8位
    commitTags:
      type: array
      items:
        type: string
      description: 该版本上的所有标签
    changelog:
      type: string
      nullable: true
    publishedAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time

ArtifactLineageItem:
  type: object
  required:
    - artifactId
    - name
    - isListed
  properties:
    artifactId:
      type: string
      format: uuid
    name:
      type: string
    isListed:
      type: boolean
      description: 是否在公开列表中可见（可发现性）
    thumbnailUrl:
      type: string
      format: uri
      nullable: true
    author:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true

ArtifactListItem:
  type: object
  required:
    - id
    - name
    - isListed
    - createdAt
    - updatedAt
    - author
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    description:
      type: string
      nullable: true
    isListed:
      type: boolean
      description: 是否在公开列表中可见（可发现性）
    thumbnailUrl:
      type: string
      format: uri
      nullable: true
    license:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    author:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true
    tags:
      type: array
      items:
        $ref: './artifact.yaml#/Tag'
    stats:
      $ref: './artifact.yaml#/ArtifactStats'

# ============================================================================
# Patch Artifact API 专用类型
# ============================================================================

PatchArtifactRequest:
  type: object
  description: |
    基于已有的 commit 和增量补丁创建新的 artifact 版本。
    客户端提交 baseCommit（基准版本）和需要变更的 nodes/edges，
    服务端将基准版本的完整 graph 与 patch 合并后创建新版本。

    如果没有 graph 变更（addNodes/removeNodeIds/addEdges/removeEdges 全部为空或不传），
    且不传 commit，则为 metadata-only 更新：直接修改 baseCommit 版本的元数据，不创建新版本。
  required:
    - artifactId
    - baseCommit
  properties:
    artifactId:
      type: string
      format: uuid
      description: 要更新的 Artifact ID
    baseCommit:
      type: string
      description: 基准版本的 commit hash
    commit:
      type: string
      description: |
        新版本的 commit hash，由客户端基于合并后的完整 graph 确定性计算。
        计算方式与 POST /artifacts 一致：hash(artifactId, parentCommit, nodes, edges)
        其中 parentCommit 为基准版本（即 baseCommit）的 commit hash。
    name:
      type: string
      minLength: 1
      maxLength: 100
    description:
      type: string
    isListed:
      type: boolean
      description: 是否在公开列表中可见（可发现性）
    version:
      type: string
      pattern: '^\d+\.\d+\.\d+(-[a-zA-Z0-9]+)?$'
      description: Semver 版本号
    changelog:
      type: string
    commitTags:
      type: array
      items:
        type: string
      description: 可选版本标签列表
    entrypoint:
      $ref: './artifact.yaml#/ArtifactEntrypoint'
      description: 可选入口点
    addNodes:
      type: array
      description: 新增或更新的节点（nodeId 已存在则更新该节点的 commit，否则新增）
      items:
        $ref: './artifact.yaml#/CreateArtifactNode'
    removeNodeIds:
      type: array
      description: 需要移除的节点 ID 列表
      items:
        type: string
        format: uuid
    addEdges:
      type: array
      description: 新增的边
      items:
        $ref: './artifact.yaml#/ArtifactEdgeDescriptor'
    removeEdges:
      type: array
      description: 需要移除的边（通过 source + target 匹配）
      items:
        $ref: './artifact.yaml#/ArtifactEdgeDescriptor'
    saves:
      type: array
      items:
        $ref: './artifact.yaml#/CreateSaveInput'
      description: |
        和 patch 同时创建的 save 列表。
        Save 的二进制数据通过 save[{commit}] 形式在 multipart form 中上传。

UpdateCommitTagsRequest:
  type: object
  description: 设置指定 commit 上的标签列表（替换语义）
  required:
    - commitHash
    - commitTags
  properties:
    commitHash:
      type: string
      description: 目标 commit hash
    commitTags:
      type: array
      items:
        type: string
      description: |
        要设置的标签列表。传空数组表示清除该 commit 上的所有标签。
        如果某个 tag 已被同 artifact 的其他 commit 使用，则自动从旧 commit 上移除。

MarkVersionWeakRequest:
  type: object
  description: |
    将一个 artifact 版本标记为 weak（不可逆操作）。
    weak 版本不对 node 产生引用计数，标记后尝试 GC 引用计数归零的 node 内容。