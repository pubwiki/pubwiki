# Node Content Schemas
# 定义各种节点类型的内容结构

# ============================================================================
# Common Types
# ============================================================================

# 节点引用
NodeRef:
  type: object
  required:
    - id
    - commit
  properties:
    id:
      type: string
      format: uuid
      description: 节点 ID
    commit:
      type: string
      description: 引用时的 commit hash

# VFS 引用
VfsRef:
  type: object
  required:
    - nodeId
    - commit
  properties:
    nodeId:
      type: string
      format: uuid
      description: VFS 节点 ID
    commit:
      type: string
      description: VFS 状态的 commit hash

# 挂载点
Mountpoint:
  type: object
  required:
    - id
    - path
  properties:
    id:
      type: string
      description: 挂载点唯一标识符
    path:
      type: string
      description: 挂载路径

# ============================================================================
# Content Block Types (用于 Input/Prompt 节点)
# ============================================================================

TextBlock:
  type: object
  required:
    - type
    - value
  properties:
    type:
      type: string
      const: text
    value:
      type: string

RefTagBlock:
  type: object
  required:
    - type
    - name
  properties:
    type:
      type: string
      const: reftag
    name:
      type: string
      description: 引用的节点名称

ContentBlock:
  oneOf:
    - $ref: '#/TextBlock'
    - $ref: '#/RefTagBlock'
  discriminator:
    propertyName: type

# ============================================================================
# Input Generation Config
# ============================================================================

InputGenerationConfig:
  type: object
  properties:
    model:
      type: string
      description: 生成使用的模型（空=使用全局设置）
    temperature:
      type: number
      minimum: 0
      maximum: 2
      description: 生成温度
    schema:
      type: string
      description: 结构化输出的 JSON Schema

# ============================================================================
# Message Block Types (用于 Generated 节点，来自 @pubwiki/chat)
# ============================================================================

MessageBlockType:
  type: string
  enum:
    - text
    - markdown
    - code
    - tool_call
    - tool_result
    - image
    - reasoning
  description: |
    Message block types:
    - text: Plain text
    - markdown: Markdown content
    - code: Code block
    - tool_call: Tool call request
    - tool_result: Tool call result
    - image: Image (reserved for future)
    - reasoning: Reasoning content

ToolCallStatus:
  type: string
  enum:
    - pending
    - running
    - completed
    - error
  description: Tool call execution status

MessageBlock:
  type: object
  required:
    - id
    - type
    - content
  properties:
    id:
      type: string
      description: Unique block ID
    type:
      $ref: '#/MessageBlockType'
    content:
      type: string
      description: Block content
    metadata:
      type: object
      additionalProperties: true
      description: Additional metadata
    toolCallId:
      type: string
      description: Tool call ID (for tool_call and tool_result types)
    toolName:
      type: string
      description: Tool name (for tool_call type)
    toolArgs:
      description: Tool arguments (for tool_call type)
    toolStatus:
      $ref: '#/ToolCallStatus'

# ============================================================================
# Node Content Types
# ============================================================================

# INPUT 节点内容
InputNodeContent:
  type: object
  required:
    - type
    - blocks
  properties:
    type:
      type: string
      const: INPUT
    blocks:
      type: array
      items:
        $ref: '#/ContentBlock'
    mountpoints:
      type: array
      items:
        $ref: '#/Mountpoint'
    generationConfig:
      $ref: '#/InputGenerationConfig'

# PROMPT 节点内容
PromptNodeContent:
  type: object
  required:
    - type
    - blocks
  properties:
    type:
      type: string
      const: PROMPT
    blocks:
      type: array
      items:
        $ref: '#/ContentBlock'

# GENERATED 节点内容
GeneratedNodeContent:
  type: object
  required:
    - type
    - blocks
    - inputRef
  properties:
    type:
      type: string
      const: GENERATED
    blocks:
      type: array
      items:
        $ref: '#/MessageBlock'
    inputRef:
      $ref: '#/NodeRef'
    promptRefs:
      type: array
      items:
        $ref: '#/NodeRef'
    indirectPromptRefs:
      type: array
      items:
        $ref: '#/NodeRef'
    inputVfsRef:
      $ref: '#/VfsRef'
      nullable: true
    outputVfsId:
      type: string
      format: uuid
      nullable: true
    postGenerationCommit:
      type: string
      description: Post-generation commit hash - recorded after file modifications are complete
      nullable: true

# SANDBOX 节点内容
SandboxNodeContent:
  type: object
  required:
    - type
  properties:
    type:
      type: string
      const: SANDBOX
    entryFile:
      type: string
      default: index.html

# LOADER 节点内容
LoaderNodeContent:
  type: object
  required:
    - type
  properties:
    type:
      type: string
      const: LOADER
    mountpoints:
      type: array
      items:
        $ref: '#/Mountpoint'

# STATE 节点内容（仅存储 SAVE 版本引用列表）
# 实际存档元数据（title, description）存储在 SaveNodeContent / save_contents 中
StateNodeContent:
  type: object
  required:
    - type
  properties:
    type:
      type: string
      const: STATE
    saves:
      type: array
      items:
        type: string
      description: |
        引用的 SAVE 版本 commit hash 列表。
        STATE node 通过此字段引用同一 nodeId 下的 SAVE 类型 node versions。
        作者先通过 Save API 上传存档（SAVE 版本），再在 artifact 的 STATE node 中引用这些 commit。

# VFS 挂载配置
VfsMountConfig:
  type: object
  required:
    - id
    - sourceNodeId
    - mountPath
  properties:
    id:
      type: string
      description: 挂载点唯一标识符
    sourceNodeId:
      type: string
      format: uuid
      description: 源 VFS 节点 ID
    mountPath:
      type: string
      description: 挂载路径
    sourceCommit:
      type: string
      description: 源 VFS 版本 commit hash

# VFS 文件信息
VfsFileInfo:
  type: object
  required:
    - path
  properties:
    path:
      type: string
      description: 文件路径
    size:
      type: integer
      description: 文件大小 (bytes)
    mimeType:
      type: string
      description: MIME 类型

# VFS 节点内容（仅文件摘要信息）
VfsNodeContent:
  type: object
  required:
    - type
    - projectId
  properties:
    type:
      type: string
      const: VFS
    projectId:
      type: string
      description: 所属项目 ID
    mounts:
      type: array
      description: VfsMountConfig[] 挂载配置
      items:
        $ref: '#/VfsMountConfig'
    fileCount:
      type: integer
      description: 文件总数
    totalSize:
      type: integer
      description: 总大小 (bytes)
    fileTree:
      type: array
      description: 文件目录树
      items:
        $ref: '#/VfsFileInfo'
    files:
      type: array
      description: 文件列表（用于 API 验证）
      items:
        $ref: '#/VfsFileInfo'

# ============================================================================
# Union Type for All Node Contents
# ============================================================================

ArtifactNodeContent:
  oneOf:
    - $ref: '#/InputNodeContent'
    - $ref: '#/PromptNodeContent'
    - $ref: '#/GeneratedNodeContent'
    - $ref: '#/SandboxNodeContent'
    - $ref: '#/LoaderNodeContent'
    - $ref: '#/StateNodeContent'
    - $ref: '#/VfsNodeContent'
  discriminator:
    propertyName: type
    mapping:
      INPUT: '#/InputNodeContent'
      PROMPT: '#/PromptNodeContent'
      GENERATED: '#/GeneratedNodeContent'
      SANDBOX: '#/SandboxNodeContent'
      LOADER: '#/LoaderNodeContent'
      STATE: '#/StateNodeContent'
      VFS: '#/VfsNodeContent'
