# Save-related schemas

SaveDetail:
  type: object
  required:
    - saveId
    - commit
    - authorId
    - authoredAt
    - stateNodeId
    - artifactId
    - artifactCommit
    - quadsHash
    - saveEncoding
    - isListed
    - createdAt
  properties:
    saveId:
      type: string
      description: Save 节点 ID（客户端提供）
    commit:
      type: string
      description: Save 版本 commit hash
    parent:
      type: string
      nullable: true
      description: 父版本 commit hash
    authorId:
      type: string
      format: uuid
    authoredAt:
      type: string
      format: date-time
    stateNodeId:
      type: string
      format: uuid
      description: 关联的 STATE 节点 ID
    artifactId:
      type: string
      format: uuid
      description: 创建此 Save 的 artifact ID
    artifactCommit:
      type: string
      description: 创建此 Save 的 artifact 版本 commit hash
    quadsHash:
      type: string
      description: quads.bin 的 SHA-256，用于 R2 路径 saves/{quadsHash}/quads.bin
    saveEncoding:
      type: string
      enum: [keyframe, delta]
      description: 存储编码类型（keyframe=全量快照, delta=增量）
    parentCommit:
      type: string
      nullable: true
      description: Delta chain 父 save 的 commit（saveEncoding=delta 时有值，keyframe 时为 null）
    title:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    isListed:
      type: boolean
      description: 是否在公开列表中可见（可发现性）
    createdAt:
      type: string
      format: date-time

# Request for creating user runtime saves (POST /saves)
# Official saves are created as SAVE artifact nodes during artifact creation
CreateSaveRequest:
  type: object
  required:
    - saveId
    - stateNodeId
    - commit
    - artifactId
    - artifactCommit
    - contentHash
    - quadsHash
    - saveEncoding
  properties:
    saveId:
      type: string
      format: uuid
      description: Save 节点 ID（客户端自由提供）
    stateNodeId:
      type: string
      format: uuid
      description: 关联的 STATE 节点 ID
    commit:
      type: string
      description: Save 版本 commit hash（客户端计算）
    parent:
      type: string
      nullable: true
      description: 父版本 commit hash（可选）
    artifactId:
      type: string
      format: uuid
      description: 关联的 artifact ID
    artifactCommit:
      type: string
      description: 关联的 artifact 版本 commit hash
    contentHash:
      type: string
      description: 内容指纹
    quadsHash:
      type: string
      description: quads.bin 的 SHA-256（客户端计算）
    saveEncoding:
      type: string
      enum: [keyframe, delta]
      description: 存储编码类型（keyframe=全量快照, delta=增量）
    parentCommit:
      type: string
      nullable: true
      description: Delta chain 父 save 的 commit（saveEncoding=delta 时必填）
    title:
      type: string
      description: 存档标题
    description:
      type: string
      description: 存档描述
    isListed:
      type: boolean
      default: false
      description: 是否在公开列表中可见（可发现性）

# Batch save creation entry (for POST /saves/batch)
BatchSaveEntry:
  type: object
  required:
    - saveEncoding
    - quadsHash
  properties:
    saveEncoding:
      type: string
      enum: [keyframe, delta]
      description: 存储编码类型
    quadsHash:
      type: string
      description: 数据文件的 SHA-256
    title:
      type: string
      description: 存档标题
    description:
      type: string
      description: 存档描述

# Batch save creation request metadata (POST /saves/batch)
BatchSaveMetadata:
  type: object
  required:
    - stateNodeId
    - artifactId
    - artifactCommit
    - entries
  properties:
    stateNodeId:
      type: string
      format: uuid
      description: 关联的 STATE 节点 ID
    artifactId:
      type: string
      format: uuid
      description: 关联的 artifact ID
    artifactCommit:
      type: string
      description: 关联的 artifact 版本 commit hash
    isListed:
      type: boolean
      default: false
      description: 是否在公开列表中可见
    entries:
      type: array
      items:
        $ref: '#/BatchSaveEntry'
      minItems: 1
      description: |
        Save 条目数组。entries[0] 必须是 keyframe，后续为 delta。
        服务端自动将 entries[i] 的 parentCommit 设为 entries[i-1] 的 commit。
