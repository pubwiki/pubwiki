# Save-related schemas

SaveDetail:
  type: object
  required:
    - saveId
    - commit
    - authorId
    - authoredAt
    - stateNodeId
    - stateNodeCommit
    - artifactId
    - artifactCommit
    - quadsHash
    - isListed
    - createdAt
  properties:
    saveId:
      type: string
      description: Save 节点 ID（服务端计算：hash(stateNodeId, stateNodeCommit, userId, artifactId, artifactCommit)）
    commit:
      type: string
      description: Save 版本 commit hash
    parent:
      type: string
      nullable: true
      description: 父版本 commit hash
    authorId:
      type: string
      format: uuid
    authoredAt:
      type: string
      format: date-time
    stateNodeId:
      type: string
      format: uuid
      description: 关联的 STATE 节点 ID
    stateNodeCommit:
      type: string
      description: 关联的 STATE 节点版本 commit hash
    artifactId:
      type: string
      format: uuid
      description: 创建此 Save 的 artifact ID
    artifactCommit:
      type: string
      description: 创建此 Save 的 artifact 版本 commit hash
    quadsHash:
      type: string
      description: quads.bin 的 SHA-256，用于 R2 路径 saves/{quadsHash}/quads.bin
    title:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    isListed:
      type: boolean
      description: 是否在公开列表中可见（可发现性）
    createdAt:
      type: string
      format: date-time

# Request for creating user runtime saves (POST /saves)
# Official saves are created as SAVE artifact nodes during artifact creation
CreateSaveRequest:
  type: object
  required:
    - saveId
    - stateNodeId
    - stateNodeCommit
    - commit
    - artifactId
    - artifactCommit
    - contentHash
    - quadsHash
  properties:
    saveId:
      type: string
      format: uuid
      description: Save 节点 ID（客户端自由提供）
    stateNodeId:
      type: string
      format: uuid
      description: 关联的 STATE 节点 ID
    stateNodeCommit:
      type: string
      description: 关联的 STATE 节点版本 commit hash
    commit:
      type: string
      description: Save 版本 commit hash（客户端计算）
    parent:
      type: string
      nullable: true
      description: 父版本 commit hash（可选）
    artifactId:
      type: string
      format: uuid
      description: 关联的 artifact ID
    artifactCommit:
      type: string
      description: 关联的 artifact 版本 commit hash
    contentHash:
      type: string
      description: 内容指纹
    quadsHash:
      type: string
      description: quads.bin 的 SHA-256（客户端计算）
    title:
      type: string
      description: 存档标题
    description:
      type: string
      description: 存档描述
    isListed:
      type: boolean
      default: false
      description: 是否在公开列表中可见（可发现性）
