# Cloud Saves related schemas (纯 Checkpoint 存储模式)
# gamesave DO 不维护当前状态，只存储 checkpoint 快照

CloudSave:
  type: object
  required:
    - id
    - userId
    - name
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    stateNodeId:
      type: string
      format: uuid
      nullable: true
    name:
      type: string
    description:
      type: string
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    lastSyncedAt:
      type: string
      format: date-time
      nullable: true

CreateSaveRequest:
  type: object
  required:
    - name
    - stateNodeId
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 200
    description:
      type: string
      maxLength: 1000
    stateNodeId:
      type: string
      format: uuid

# RDF Quad 类型 - 用于同步协议，所有字段都是字符串 (N3 格式)
Quad:
  type: object
  required:
    - subject
    - predicate
    - object
  properties:
    subject:
      type: string
      description: N3 格式的 subject (e.g., '<http://example.org/s>' 或 '_:blank1')
    predicate:
      type: string
      description: N3 格式的 predicate (e.g., '<http://example.org/p>')
    object:
      type: string
      description: N3 格式的 object (e.g., '"value"' 或 '<http://example.org/o>')
    graph:
      type: string
      description: 图名称，默认为空字符串
      default: ''

# Checkpoint 相关类型

CheckpointVisibility:
  type: string
  enum:
    - PRIVATE
    - UNLISTED
    - PUBLIC

CheckpointInfo:
  type: object
  required:
    - id
    - timestamp
    - quadCount
    - visibility
  properties:
    id:
      type: string
      description: Checkpoint unique ID
    timestamp:
      type: integer
      description: 创建时间戳 (Unix ms)
    quadCount:
      type: integer
      description: Quad 数量
    name:
      type: string
      nullable: true
    description:
      type: string
      nullable: true
    visibility:
      $ref: '#/CheckpointVisibility'

# 创建 Checkpoint 请求 - 直接传入完整 snapshot
CreateCheckpointRequest:
  type: object
  required:
    - quads
  properties:
    id:
      type: string
      description: Optional custom checkpoint ID (UUID format)
    name:
      type: string
      maxLength: 200
    description:
      type: string
      maxLength: 1000
    visibility:
      $ref: '#/CheckpointVisibility'
    quads:
      type: array
      items:
        $ref: '#/Quad'
      description: 完整的 RDF quad 快照数据

CreateCheckpointResponse:
  type: object
  required:
    - success
    - id
  properties:
    success:
      type: boolean
    id:
      type: string
      description: Created checkpoint ID

# 导出 Checkpoint 响应
ExportCheckpointResponse:
  type: object
  required:
    - quads
    - quadCount
  properties:
    quads:
      type: array
      items:
        $ref: '#/Quad'
      description: Checkpoint 中存储的所有 quads
    quadCount:
      type: integer
