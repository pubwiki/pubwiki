# Artifact paths

/artifacts:
  get:
    summary: 获取公开 Artifact 列表
    description: 获取所有公开的 Artifact，支持按类型和标签过滤，支持排序
    operationId: listArtifacts
    tags:
      - Artifacts
    parameters:
      - name: page
        in: query
        description: 页码
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: 每页数量
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: tag.include
        in: query
        description: 包含的标签 slug 列表（AND 逻辑）
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: tag.exclude
        in: query
        description: 排除的标签 slug 列表
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: sortBy
        in: query
        description: 排序字段
        schema:
          $ref: '../schemas/artifact.yaml#/ArtifactSortBy'
      - name: sortOrder
        in: query
        description: 排序方向
        schema:
          $ref: '../schemas/artifact.yaml#/SortOrder'
    responses:
      '200':
        description: 成功获取 Artifact 列表
        content:
          application/json:
            schema:
              type: object
              required:
                - artifacts
                - pagination
              properties:
                artifacts:
                  type: array
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactListItem'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  post:
    summary: 创建新 Artifact（包含完整的 Node Version 数据）
    description: |
      创建新 artifact（纯 insert 语义）。提交完整的 node version 数据 + artifact 元数据。
      
      **创建模式：** 通过 metadata.artifactId 判断：
      - 该 ID 不存在于数据库中：创建新 artifact
      - 该 ID 已存在：返回 409 Conflict
      
      如需更新已有 artifact 的 graph，使用 PATCH /artifacts
      如需更新已有 artifact 的 metadata，使用 PUT /artifacts/{id}/metadata
      
      使用 multipart/form-data 格式：
      - metadata: JSON 格式的 artifact 基本信息
      - nodes: JSON 数组，包含完整的 node version 数据（仅 ARTIFACT_NODE_TYPES，不含 SAVE）
      - edges: JSON 数组，节点间连接关系
      - vfs[{commit}]: VFS 节点的 tar.gz 归档文件，key 中 commit 对应 nodes 中的 VFS 节点版本
      - save[{commit}]: Save 的二进制数据，key 中 commit 对应 saves 中的 save 版本
      - homepage: 可选的主页 Markdown 文件
      
      注意：vfs[xxx] 和 save[xxx] 是动态 key，在 OpenAPI 中通过 additionalProperties 描述。
    operationId: createArtifact
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - metadata
              - nodes
              - edges
            properties:
              metadata:
                $ref: '../schemas/artifact.yaml#/CreateArtifactMetadata'
              nodes:
                type: array
                items:
                  $ref: '../schemas/artifact.yaml#/CreateArtifactNode'
              edges:
                type: array
                items:
                  $ref: '../schemas/artifact.yaml#/ArtifactEdgeDescriptor'
              homepage:
                type: string
                format: binary
                description: 可选的主页 Markdown 文件，将被渲染为 HTML 后存储。
            # 动态 key 的二进制文件（vfs[{commit}] 和 save[{commit}]）
            # 使用 additionalProperties: true 生成 unknown 类型，避免与其他属性的类型冲突
            additionalProperties: true
          encoding:
            metadata:
              contentType: application/json
            nodes:
              contentType: application/json
            edges:
              contentType: application/json
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - artifact
              properties:
                message:
                  type: string
                  example: Artifact created successfully
                artifact:
                  $ref: '../schemas/artifact.yaml#/ArtifactListItem'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '409':
        description: Artifact ID 已存在（Conflict）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 引用的 node version 不存在（nodeId + commit 未在 node_versions 中找到）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  patch:
    summary: 基于已有版本和增量补丁创建新 Artifact 版本
    description: |
      增量更新：客户端提交 baseCommit 和变更内容（新增/删除 nodes/edges），
      服务端将基准版本的完整 graph 与 patch 合并后创建新版本。
      
      此接口仅用于 graph 变更，不支持 metadata 修改。
      如需修改 artifact metadata，请使用 PUT /artifacts/{id}/metadata
    operationId: patchArtifact
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - metadata
            properties:
              metadata:
                $ref: '../schemas/artifact.yaml#/PatchArtifactRequest'
              homepage:
                type: string
                format: binary
                description: 可选的主页 Markdown 文件
            # 动态 key 的二进制文件（vfs[{commit}] 和 save[{commit}]）
            # 使用 additionalProperties: true 生成 unknown 类型，避免与其他属性的类型冲突
            additionalProperties: true
          encoding:
            metadata:
              contentType: application/json
    responses:
      '200':
        description: 补丁应用成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - artifact
              properties:
                message:
                  type: string
                  example: Artifact patched successfully
                artifact:
                  $ref: '../schemas/artifact.yaml#/ArtifactListItem'
      '400':
        description: 请求参数错误（如 baseCommit 不存在）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限更新该 artifact
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 或 baseCommit 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '409':
        description: Commit hash 冲突（该版本已存在）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  delete:
    summary: 删除 Artifact
    description: |
      删除指定 Artifact。需要认证且具有 manage 权限。
      删除时会：
      - 级联删除所有关联的 Article
      - 解除与 Project 的关联
      - 删除所有版本和相关数据
      - 同步清理 R2 中的 VFS 文件
      不会删除共享的 node_versions（可能被其他 artifact 引用）。
    operationId: deleteArtifact
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: 删除成功
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/search:
  get:
    summary: 搜索公开 Artifact
    description: |
      全文搜索公开的 Artifact，匹配 name 和 description 字段。
      默认按相关度排序，支持标签过滤和分页。
      使用 SQLite FTS5 进行全文搜索。
    operationId: searchArtifacts
    tags:
      - Artifacts
    parameters:
      - name: q
        in: query
        required: true
        description: 搜索关键词（匹配 name 和 description）
        schema:
          type: string
          minLength: 1
          maxLength: 200
      - name: page
        in: query
        description: 页码
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: 每页数量
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: tag.include
        in: query
        description: 包含的标签 slug 列表（AND 逻辑）
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: tag.exclude
        in: query
        description: 排除的标签 slug 列表
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: sortBy
        in: query
        description: 排序字段（默认 relevance）
        schema:
          type: string
          enum: [relevance, createdAt, updatedAt, viewCount, favCount]
          default: relevance
      - name: sortOrder
        in: query
        description: 排序方向
        schema:
          $ref: '../schemas/artifact.yaml#/SortOrder'
    responses:
      '200':
        description: 成功获取搜索结果
        content:
          application/json:
            schema:
              type: object
              required:
                - artifacts
                - pagination
              properties:
                artifacts:
                  type: array
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactListItem'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '400':
        description: 请求参数错误（如搜索词为空）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/homepage:
  get:
    summary: 获取 Artifact 主页 HTML
    description: |
      获取指定 Artifact 的只读主页 HTML 内容。
      HTML 内容存储在 R2 中，存储 key 由 artifactId 派生。
      访问权限由 ACL 系统控制，无权访问时返回 403。
    operationId: getArtifactHomepage
    tags:
      - Artifacts
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: 成功获取主页 HTML
        content:
          text/html:
            schema:
              type: string
              description: Artifact 主页的 HTML 内容
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 不存在或主页未创建
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/lineage:
  get:
    summary: 获取 Artifact 的谱系信息
    description: |
      获取指定 Artifact 的谱系（依赖和派生关系）。
      支持递归查询多代父/子关系，可通过 parentDepth 和 childDepth 控制递归深度。
      返回的每个条目包含 parentId 字段，用于在前端构建树状结构。
      访问权限由 ACL 系统控制，无权访问时返回 403。
    operationId: getArtifactLineage
    tags:
      - Artifacts
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
      - name: parentDepth
        in: query
        required: false
        description: 向上追溯父代的深度（1=直接父代，2=父代+祖父代...）。不指定则无限递归。
        schema:
          type: integer
          minimum: 1
      - name: commit
        in: query
        required: false
        description: |
          指定要查询谱系的版本 commit hash。
          不指定则使用 artifact 的当前版本（currentVersionId）。
        schema:
          type: string
      - name: childDepth
        in: query
        required: false
        description: 向下追溯子代的深度（1=直接子代，2=子代+孙代...）。不指定则无限递归。
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: 成功获取谱系信息
        content:
          application/json:
            schema:
              type: object
              required:
                - parents
                - children
              properties:
                parents:
                  type: array
                  description: 此 Artifact 依赖的父 Artifact
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactLineageItem'
                children:
                  type: array
                  description: 依赖此 Artifact 的子 Artifact
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactLineageItem'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/graph:
  get:
    summary: 获取 Artifact 节点图结构
    description: |
      获取 artifact 的完整节点和边列表。
      访问权限由 ACL 系统控制，无权访问时返回 403。
    operationId: getArtifactGraph
    tags:
      - Nodes
    parameters:
      - name: artifactId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: version
        in: query
        schema:
          type: string
          default: latest
        description: artifact 版本哈希、commitTag 或 "latest"
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              required:
                - nodes
                - edges
                - version
              properties:
                nodes:
                  type: array
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactNodeSummary'
                edges:
                  type: array
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactEdge'
                version:
                  type: object
                  required:
                    - id
                    - commitHash
                    - version
                    - createdAt
                  properties:
                    id:
                      type: string
                      format: uuid
                    commitHash:
                      type: string
                    commitTags:
                      type: array
                      items:
                        type: string
                      description: 该版本上的所有标签
                    version:
                      type: string
                    entrypoint:
                      $ref: '../schemas/artifact.yaml#/ArtifactEntrypoint'
                      nullable: true
                      description: 该版本的入口点（如有）
                    buildCacheKey:
                      type: string
                      description: |
                        Content-addressable key for pre-built sandbox output.
                        If present, consumers can fetch build cache via GET /build-cache/{cacheKey}.
                        If absent, consumers fall back to local compilation.
                    createdAt:
                      type: string
                      format: date-time
      '401':
        description: 需要认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/metadata:
  put:
    summary: 修改 Artifact 的 metadata
    description: |
      修改 artifact 的 metadata（不涉及 graph 结构变更）。
      
      **权限变更说明：**
      - private → public：直接更新 ACL（单向宽松），不创建新版本
      - public → private：服务端自动 fork 所有节点为私有版本，创建新 commit 并返回
        - 同时会将所有关联的 article 也设为私有
        - 自动生成 changelog: "Visibility changed from public to private"
    operationId: updateArtifactMetadata
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/artifact.yaml#/UpdateArtifactMetadataRequest'
    responses:
      '200':
        description: Metadata 更新成功
        content:
          application/json:
            schema:
              $ref: '../schemas/artifact.yaml#/UpdateArtifactMetadataResponse'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/versions/{commitHash}/metadata:
  put:
    summary: 修改特定版本的 metadata
    description: |
      修改指定 commit 的版本 metadata（version, changelog, commitTags, entrypoint）。
      此 API 替代原有的 updateCommitTags API，提供更完整的版本 metadata 修改能力。
    operationId: updateVersionMetadata
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
      - name: commitHash
        in: path
        required: true
        description: 版本的 commit hash
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/artifact.yaml#/UpdateVersionMetadataRequest'
    responses:
      '200':
        description: 版本 metadata 更新成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - version
              properties:
                message:
                  type: string
                  example: Version metadata updated successfully
                version:
                  $ref: '../schemas/artifact.yaml#/ArtifactVersion'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 或版本不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/build:
  get:
    summary: Download pre-built sandbox output archive
    description: |
      Returns the pre-built build output archive (tar.gz) for the specified version
      of the artifact. Returns 404 if no build cache is available.
      Content-addressed and immutable — safe to cache aggressively.
    operationId: getArtifactBuild
    tags:
      - Artifacts
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
      - name: version
        in: query
        required: true
        description: |
          Version identifier: commitHash, commitTag, or 'latest'.
          Same semantics as GET /artifacts/{artifactId}/graph?version=.
        schema:
          type: string
    responses:
      '200':
        description: Build archive (tar.gz)
        content:
          application/gzip:
            schema:
              type: string
              format: binary
      '400':
        description: Missing required query parameter
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: No build cache available for this version
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'