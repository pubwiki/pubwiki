# Artifact paths

/artifacts:
  get:
    summary: 获取公开 Artifact 列表
    description: 获取所有公开的 Artifact，支持按类型和标签过滤，支持排序
    operationId: listArtifacts
    tags:
      - Artifacts
    parameters:
      - name: page
        in: query
        description: 页码
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: 每页数量
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: tag.include
        in: query
        description: 包含的标签 slug 列表（AND 逻辑）
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: tag.exclude
        in: query
        description: 排除的标签 slug 列表
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      - name: sortBy
        in: query
        description: 排序字段
        schema:
          type: string
          enum: [createdAt, updatedAt, viewCount, starCount]
          default: createdAt
      - name: sortOrder
        in: query
        description: 排序方向
        schema:
          type: string
          enum: [asc, desc]
          default: desc
    responses:
      '200':
        description: 成功获取 Artifact 列表
        content:
          application/json:
            schema:
              type: object
              required:
                - artifacts
                - pagination
              properties:
                artifacts:
                  type: array
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactListItem'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  post:
    summary: 创建或更新 Artifact（包含完整的 Node Version 数据）
    description: |
      一步发布：提交完整的 node version 数据 + artifact 元数据，服务端内部同步 node versions 并创建 artifact version。
      
      **创建/更新模式：** 通过 metadata.artifactId 判断：
      - 该 ID 不存在于数据库中：创建新 artifact
      - 该 ID 存在且 owner 是当前用户：追加新版本（append-only）
      - 该 ID 存在但 owner 不是当前用户：返回 403 Forbidden
      
      使用 multipart/form-data 格式：
      - metadata: JSON 格式的 artifact 基本信息
      - nodes: JSON 数组，包含完整的 node version 数据（仅 ARTIFACT_NODE_TYPES，不含 SAVE）
      - edges: JSON 数组，节点间连接关系
      - vfs[{commit}]: VFS 节点的 tar.gz 归档文件，key 中 commit 对应 nodes 中的 VFS 节点版本
      - save[{commit}]: Save 的二进制数据，key 中 commit 对应 saves 中的 save 版本
      - homepage: 可选的主页 Markdown 文件
      
      注意：vfs[xxx] 和 save[xxx] 是动态 key，在 OpenAPI 中通过 additionalProperties 描述。
    operationId: createArtifact
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - metadata
              - nodes
              - edges
            properties:
              metadata:
                $ref: '../schemas/artifact.yaml#/CreateArtifactMetadata'
              nodes:
                type: array
                items:
                  $ref: '../schemas/artifact.yaml#/CreateArtifactNode'
              edges:
                type: array
                items:
                  $ref: '../schemas/artifact.yaml#/ArtifactEdgeDescriptor'
              homepage:
                type: string
                format: binary
                description: 可选的主页 Markdown 文件，将被渲染为 HTML 后存储。
            # 动态 key 的二进制文件（vfs[{commit}] 和 save[{commit}]）
            # 使用 additionalProperties: true 生成 unknown 类型，避免与其他属性的类型冲突
            additionalProperties: true
          encoding:
            metadata:
              contentType: application/json
            nodes:
              contentType: application/json
            edges:
              contentType: application/json
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - artifact
              properties:
                message:
                  type: string
                  example: Artifact created successfully
                artifact:
                  $ref: '../schemas/artifact.yaml#/ArtifactListItem'
      '200':
        description: 更新成功（当 metadata.artifactId 存在时）
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - artifact
              properties:
                message:
                  type: string
                  example: Artifact updated successfully
                artifact:
                  $ref: '../schemas/artifact.yaml#/ArtifactListItem'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限更新该 artifact（不是 owner）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 引用的 node version 不存在（nodeId + commit 未在 node_versions 中找到）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  patch:
    summary: 基于已有版本和增量补丁创建新 Artifact 版本
    description: |
      增量更新：客户端提交 baseCommit 和变更内容（新增/删除 nodes/edges），
      服务端将基准版本的完整 graph 与 patch 合并后创建新版本。
      
      适用于只修改了部分节点的场景，避免重新提交所有节点数据。
      注意：新增的节点需要包含完整的 node version 数据。

      如果没有 graph 变更且不传 commit，则为 metadata-only 更新：
      直接修改 baseCommit 版本的元数据（version, changelog, commitTags, entrypoint 等），
      不创建新版本。
    operationId: patchArtifact
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - metadata
            properties:
              metadata:
                $ref: '../schemas/artifact.yaml#/PatchArtifactRequest'
              homepage:
                type: string
                format: binary
                description: 可选的主页 Markdown 文件
            # 动态 key 的二进制文件（vfs[{commit}] 和 save[{commit}]）
            # 使用 additionalProperties: true 生成 unknown 类型，避免与其他属性的类型冲突
            additionalProperties: true
          encoding:
            metadata:
              contentType: application/json
    responses:
      '200':
        description: 补丁应用成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - artifact
                - versionCreated
              properties:
                message:
                  type: string
                  example: Artifact patched successfully
                artifact:
                  $ref: '../schemas/artifact.yaml#/ArtifactListItem'
                versionCreated:
                  type: boolean
                  description: 是否创建了新版本（false 表示仅更新了 metadata）
      '400':
        description: 请求参数错误（如 baseCommit 不存在）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限更新该 artifact
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 或 baseCommit 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '409':
        description: Commit hash 冲突（该版本已存在）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/homepage:
  get:
    summary: 获取 Artifact 主页 HTML
    description: |
      获取指定 Artifact 的只读主页 HTML 内容。
      HTML 内容存储在 R2 中，存储 key 由 artifactId 派生。
      - PUBLIC artifact: 所有人可访问
      - UNLISTED artifact: 仅注册用户可访问
      - PRIVATE artifact: 仅 owner 可访问
    operationId: getArtifactHomepage
    tags:
      - Artifacts
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: 成功获取主页 HTML
        content:
          text/html:
            schema:
              type: string
              description: Artifact 主页的 HTML 内容
      '401':
        description: 需要认证（访问 UNLISTED artifact 时）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问（访问 PRIVATE artifact 时）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 不存在或主页未创建
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/lineage:
  get:
    summary: 获取 Artifact 的谱系信息
    description: |
      获取指定 Artifact 的谱系（依赖和派生关系）。
      支持递归查询多代父/子关系，可通过 parentDepth 和 childDepth 控制递归深度。
      返回的每个条目包含 parentId 字段，用于在前端构建树状结构。
      - PUBLIC artifact: 所有人可访问
      - UNLISTED artifact: 仅注册用户可访问
      - PRIVATE artifact: 仅 owner 可访问
    operationId: getArtifactLineage
    tags:
      - Artifacts
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
      - name: parentDepth
        in: query
        required: false
        description: 向上追溯父代的深度（1=直接父代，2=父代+祖父代...）。不指定则无限递归。
        schema:
          type: integer
          minimum: 1
      - name: commit
        in: query
        required: false
        description: |
          指定要查询谱系的版本 commit hash。
          不指定则使用 artifact 的当前版本（currentVersionId）。
        schema:
          type: string
      - name: childDepth
        in: query
        required: false
        description: 向下追溯子代的深度（1=直接子代，2=子代+孙代...）。不指定则无限递归。
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: 成功获取谱系信息
        content:
          application/json:
            schema:
              type: object
              required:
                - parents
                - children
              properties:
                parents:
                  type: array
                  description: 此 Artifact 依赖的父 Artifact
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactLineageItem'
                children:
                  type: array
                  description: 依赖此 Artifact 的子 Artifact
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactLineageItem'
      '401':
        description: 需要认证（访问 UNLISTED artifact 时）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问（访问 PRIVATE artifact 时）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/graph:
  get:
    summary: 获取 Artifact 节点图结构
    description: |
      获取 artifact 的完整节点和边列表。
      - PUBLIC artifact: 所有人可访问
      - UNLISTED artifact: 仅注册用户可访问
      - PRIVATE artifact: 仅 owner 可访问
    operationId: getArtifactGraph
    tags:
      - Nodes
    parameters:
      - name: artifactId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: version
        in: query
        schema:
          type: string
          default: latest
        description: artifact 版本哈希、commitTag 或 "latest"
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              required:
                - nodes
                - edges
                - version
              properties:
                nodes:
                  type: array
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactNodeSummary'
                edges:
                  type: array
                  items:
                    $ref: '../schemas/artifact.yaml#/ArtifactEdge'
                version:
                  type: object
                  required:
                    - id
                    - commitHash
                    - version
                    - createdAt
                  properties:
                    id:
                      type: string
                      format: uuid
                    commitHash:
                      type: string
                    commitTags:
                      type: array
                      items:
                        type: string
                      description: 该版本上的所有标签
                    version:
                      type: string
                    entrypoint:
                      $ref: '../schemas/artifact.yaml#/ArtifactEntrypoint'
                      nullable: true
                      description: 该版本的入口点（如有）
                    createdAt:
                      type: string
                      format: date-time
      '401':
        description: 需要认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/commit-tag:
  put:
    summary: 设置 commit 上的标签列表
    description: |
      设置指定 commit 上的 commitTags 列表（替换语义）。
      如果某个 tag 已被同 artifact 的其他 commit 使用，则自动从旧 commit 上移除（override 语义）。
      传空数组可清除该 commit 上的所有标签。
    operationId: updateCommitTags
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/artifact.yaml#/UpdateCommitTagsRequest'
    responses:
      '200':
        description: commitTags 更新成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - version
              properties:
                message:
                  type: string
                  example: Commit tag updated successfully
                version:
                  $ref: '../schemas/artifact.yaml#/ArtifactVersion'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 或 commit 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/artifacts/{artifactId}/versions/{commitHash}/weak:
  put:
    summary: 标记版本为 weak（不可逆）
    description: |
      将指定版本标记为 weak 版本（不可逆操作）。weak 版本不会对其关联的 node 产生引用计数。
      标记为 weak 后，会尝试 GC 掉引用计数归零的 node 内容。
      已经标记为 weak 的版本不能取消标记。
    operationId: markVersionWeak
    tags:
      - Artifacts
    security:
      - cookieAuth: []
    parameters:
      - name: artifactId
        in: path
        required: true
        description: Artifact ID
        schema:
          type: string
          format: uuid
      - name: commitHash
        in: path
        required: true
        description: 版本的 commit hash
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/artifact.yaml#/MarkVersionWeakRequest'
    responses:
      '200':
        description: 标记成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - gcResult
              properties:
                message:
                  type: string
                  example: Version marked as weak
                gcResult:
                  type: object
                  properties:
                    decremented:
                      type: integer
                      description: 引用计数被减少的内容数量
                    deleted:
                      type: integer
                      description: 引用计数归零被删除的内容数量
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Artifact 或版本不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'