# Discussion paths

/discussions:
  get:
    summary: 获取讨论列表
    description: |
      获取指定目标（Artifact 或 Project）的讨论列表。
      必须指定 targetType 和 targetId。
    operationId: listDiscussions
    tags:
      - Discussions
    parameters:
      - name: targetType
        in: query
        required: true
        description: 目标类型
        schema:
          $ref: '../schemas/discussion.yaml#/DiscussionTargetType'
      - name: targetId
        in: query
        required: true
        description: 目标 ID
        schema:
          type: string
          format: uuid
      - name: category
        in: query
        description: 按分类筛选
        schema:
          $ref: '../schemas/discussion.yaml#/DiscussionCategory'
      - name: page
        in: query
        description: 页码
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: 每页数量
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: sortBy
        in: query
        description: 排序字段
        schema:
          $ref: '../schemas/artifact.yaml#/DiscussionSortBy'
      - name: sortOrder
        in: query
        description: 排序方向
        schema:
          $ref: '../schemas/artifact.yaml#/SortOrder'
    responses:
      '200':
        description: 成功获取讨论列表
        content:
          application/json:
            schema:
              type: object
              required:
                - discussions
                - pagination
              properties:
                discussions:
                  type: array
                  items:
                    $ref: '../schemas/discussion.yaml#/DiscussionListItem'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  post:
    summary: 创建讨论
    description: |
      在指定目标上创建新讨论。需要认证。
    operationId: createDiscussion
    tags:
      - Discussions
    security:
      - cookieAuth: []
    parameters:
      - name: targetType
        in: query
        required: true
        description: 目标类型
        schema:
          $ref: '../schemas/discussion.yaml#/DiscussionTargetType'
      - name: targetId
        in: query
        required: true
        description: 目标 ID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/discussion.yaml#/CreateDiscussionRequest'
    responses:
      '201':
        description: 成功创建讨论
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - discussion
              properties:
                message:
                  type: string
                discussion:
                  $ref: '../schemas/discussion.yaml#/DiscussionDetail'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/discussions/{discussionId}:
  get:
    summary: 获取讨论详情
    operationId: getDiscussion
    tags:
      - Discussions
    parameters:
      - name: discussionId
        in: path
        required: true
        description: 讨论 ID
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: 成功获取讨论详情
        content:
          application/json:
            schema:
              $ref: '../schemas/discussion.yaml#/DiscussionDetail'
      '404':
        description: 讨论不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  patch:
    summary: 更新讨论
    description: 更新讨论内容。只有作者可以更新。
    operationId: updateDiscussion
    tags:
      - Discussions
    security:
      - cookieAuth: []
    parameters:
      - name: discussionId
        in: path
        required: true
        description: 讨论 ID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/discussion.yaml#/UpdateDiscussionRequest'
    responses:
      '200':
        description: 成功更新讨论
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - discussion
              properties:
                message:
                  type: string
                discussion:
                  $ref: '../schemas/discussion.yaml#/DiscussionDetail'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 讨论不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  delete:
    summary: 删除讨论
    description: 删除讨论。作者或管理员可以删除。
    operationId: deleteDiscussion
    tags:
      - Discussions
    security:
      - cookieAuth: []
    parameters:
      - name: discussionId
        in: path
        required: true
        description: 讨论 ID
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: 成功删除讨论
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 讨论不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/discussions/{discussionId}/pin:
  post:
    summary: 置顶/取消置顶讨论
    description: 管理员功能。
    operationId: pinDiscussion
    tags:
      - Discussions
    security:
      - cookieAuth: []
    parameters:
      - name: discussionId
        in: path
        required: true
        description: 讨论 ID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - isPinned
            properties:
              isPinned:
                type: boolean
    responses:
      '200':
        description: 成功更新置顶状态
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - discussion
              properties:
                message:
                  type: string
                discussion:
                  $ref: '../schemas/discussion.yaml#/DiscussionDetail'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限（需要管理员）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 讨论不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/discussions/{discussionId}/lock:
  post:
    summary: 锁定/解锁讨论
    description: 管理员功能。锁定后不能发表新回复。
    operationId: lockDiscussion
    tags:
      - Discussions
    security:
      - cookieAuth: []
    parameters:
      - name: discussionId
        in: path
        required: true
        description: 讨论 ID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - isLocked
            properties:
              isLocked:
                type: boolean
    responses:
      '200':
        description: 成功更新锁定状态
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - discussion
              properties:
                message:
                  type: string
                discussion:
                  $ref: '../schemas/discussion.yaml#/DiscussionDetail'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限（需要管理员）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 讨论不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/discussions/{discussionId}/replies:
  get:
    summary: 获取讨论回复列表
    operationId: listDiscussionReplies
    tags:
      - Discussions
    parameters:
      - name: discussionId
        in: path
        required: true
        description: 讨论 ID
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        description: 页码
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: 每页数量
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
      - name: sortOrder
        in: query
        description: 排序方向
        schema:
          type: string
          enum: [asc, desc]
          default: asc
    responses:
      '200':
        description: 成功获取回复列表
        content:
          application/json:
            schema:
              type: object
              required:
                - replies
                - pagination
              properties:
                replies:
                  type: array
                  items:
                    $ref: '../schemas/discussion.yaml#/DiscussionReplyItem'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '404':
        description: 讨论不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  post:
    summary: 创建回复
    description: 在讨论中发表回复。需要认证。
    operationId: createDiscussionReply
    tags:
      - Discussions
    security:
      - cookieAuth: []
    parameters:
      - name: discussionId
        in: path
        required: true
        description: 讨论 ID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/discussion.yaml#/CreateDiscussionReplyRequest'
    responses:
      '201':
        description: 成功创建回复
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - reply
              properties:
                message:
                  type: string
                reply:
                  $ref: '../schemas/discussion.yaml#/DiscussionReplyItem'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 讨论已锁定
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 讨论不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/discussions/replies/{replyId}:
  delete:
    summary: 删除回复
    description: 删除回复。作者或管理员可以删除。
    operationId: deleteDiscussionReply
    tags:
      - Discussions
    security:
      - cookieAuth: []
    parameters:
      - name: replyId
        in: path
        required: true
        description: 回复 ID
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: 成功删除回复
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 回复不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'


