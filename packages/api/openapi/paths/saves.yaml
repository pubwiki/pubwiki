# Cloud Saves paths (纯 Checkpoint 存储模式)
# gamesave DO 不维护当前状态，只存储 checkpoint 快照

/saves:
  get:
    operationId: listSaves
    summary: 获取用户的所有存档列表
    tags: [Saves]
    security:
      - cookieAuth: []
    responses:
      '200':
        description: 存档列表
        content:
          application/json:
            schema:
              type: object
              required:
                - saves
              properties:
                saves:
                  type: array
                  items:
                    $ref: '../schemas/saves.yaml#/CloudSave'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  post:
    operationId: createSave
    summary: 创建新存档
    tags: [Saves]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/saves.yaml#/CreateSaveRequest'
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/saves.yaml#/CloudSave'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '409':
        description: 存档已存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/by-state/{stateNodeId}:
  get:
    operationId: getSaveByStateNode
    summary: 通过 stateNodeId 获取存档
    description: 根据关联的 state node ID 查找存档，用于恢复本地未保存的 saveId
    tags: [Saves]
    security:
      - cookieAuth: []
    parameters:
      - name: stateNodeId
        in: path
        required: true
        schema:
          type: string
        description: State node ID
    responses:
      '200':
        description: 存档信息
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                  description: 存档 ID
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 未找到关联的存档
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/{saveId}:
  delete:
    operationId: deleteSave
    summary: 删除存档
    tags: [Saves]
    security:
      - cookieAuth: []
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: 删除成功
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

# Checkpoint API

/saves/{saveId}/checkpoints:
  get:
    operationId: listSaveCheckpoints
    summary: 获取所有 checkpoints
    description: 获取存档的所有 checkpoints。非 owner 只能看到 PUBLIC 的 checkpoints
    tags: [Saves]
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Checkpoint 列表
        content:
          application/json:
            schema:
              type: object
              required:
                - checkpoints
              properties:
                checkpoints:
                  type: array
                  items:
                    $ref: '../schemas/saves.yaml#/CheckpointInfo'
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  post:
    operationId: createSaveCheckpoint
    summary: 创建 checkpoint
    description: 直接传入完整的 RDF quad 快照创建 checkpoint
    tags: [Saves]
    security:
      - cookieAuth: []
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/saves.yaml#/CreateCheckpointRequest'
    responses:
      '201':
        description: Checkpoint 创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/saves.yaml#/CreateCheckpointResponse'
      '400':
        description: 无效的请求
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/{saveId}/checkpoints/{checkpointId}:
  get:
    operationId: getSaveCheckpoint
    summary: 获取单个 checkpoint 信息
    tags: [Saves]
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: checkpointId
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Checkpoint 信息
        content:
          application/json:
            schema:
              $ref: '../schemas/saves.yaml#/CheckpointInfo'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Checkpoint 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  delete:
    operationId: deleteSaveCheckpoint
    summary: 删除 checkpoint
    tags: [Saves]
    security:
      - cookieAuth: []
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: checkpointId
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: Checkpoint 已删除
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 存档或 checkpoint 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/{saveId}/checkpoints/{checkpointId}/export:
  get:
    operationId: exportCheckpoint
    summary: 导出 checkpoint 数据
    description: 导出指定 checkpoint 的完整 RDF quads
    tags: [Saves]
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: checkpointId
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 导出成功
        content:
          application/json:
            schema:
              $ref: '../schemas/saves.yaml#/ExportCheckpointResponse'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Checkpoint 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/{saveId}/checkpoints/{checkpointId}/visibility:
  patch:
    operationId: updateCheckpointVisibility
    summary: 更新 checkpoint 可见性
    tags: [Saves]
    security:
      - cookieAuth: []
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: checkpointId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - visibility
            properties:
              visibility:
                $ref: '../schemas/saves.yaml#/CheckpointVisibility'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              type: object
              required:
                - success
              properties:
                success:
                  type: boolean
      '400':
        description: 无效的可见性值
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权访问
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: Checkpoint 不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
