# Save paths

/saves:
  post:
    operationId: createSave
    summary: 创建存档
    description: |
      创建一个新的存档。使用 multipart/form-data 上传元数据和 quads.bin 二进制文件。
      元数据通过 JSON 字符串的 `metadata` 字段传递，二进制数据通过 `data` 字段传递。
    tags: [Saves]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - metadata
              - data
            properties:
              metadata:
                $ref: '../schemas/save.yaml#/CreateSaveRequest'
              data:
                type: string
                format: binary
                description: quads.bin 二进制数据
          encoding:
            data:
              contentType: application/octet-stream
    responses:
      '201':
        description: 存档创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/save.yaml#/SaveDetail'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
  get:
    operationId: listSaves
    summary: 获取存档列表
    description: |
      查询存档列表，支持两种查询方式（二选一）：
      1. 按 STATE 节点查询：提供 stateNodeId
      2. 按 Save 节点 ID 查询：提供 saveId

      两组参数必须提供其中一组，不能同时提供或都不提供。
    tags: [Saves]
    parameters:
      - name: stateNodeId
        in: query
        description: STATE 节点 ID
        schema:
          type: string
          format: uuid
      - name: saveId
        in: query
        description: Save 节点 ID（单独使用，与 stateNodeId 互斥）
        schema:
          type: string
          format: uuid
      - name: author
        in: query
        description: 按作者 ID 过滤
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        description: 页码（从1开始）
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: 每页数量
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: 存档列表
        content:
          application/json:
            schema:
              type: object
              required:
                - saves
                - pagination
              properties:
                saves:
                  type: array
                  items:
                    $ref: '../schemas/save.yaml#/SaveDetail'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/batch:
  post:
    operationId: createSaveBatch
    summary: 批量创建存档（delta chain）
    description: |
      批量上传一条 delta chain 的所有 save。使用 multipart/form-data 格式。
      entries[0] 必须是 keyframe，后续条目为 delta。
      服务端自动推导 parentCommit、生成 saveId/contentHash/commit。
      每个条目的二进制数据通过 data_0, data_1, ... 字段传递。
    tags: [Saves]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - metadata
            properties:
              metadata:
                $ref: '../schemas/save.yaml#/BatchSaveMetadata'
            additionalProperties: true
          encoding:
            metadata:
              contentType: application/json
    responses:
      '201':
        description: 批量创建成功
        content:
          application/json:
            schema:
              type: object
              required:
                - saves
              properties:
                saves:
                  type: array
                  items:
                    $ref: '../schemas/save.yaml#/SaveDetail'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/{saveId}/{commit}:
  get:
    operationId: getSaveLegacy
    summary: (Deprecated) 获取存档详情 - 使用 GET /saves/{commit} 代替
    tags: [Saves]
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: commit
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 存档详情
        content:
          application/json:
            schema:
              $ref: '../schemas/save.yaml#/SaveDetail'
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  delete:
    operationId: deleteSaveLegacy
    summary: (Deprecated) 删除存档 - 使用 DELETE /saves/{commit} 代替
    tags: [Saves]
    security:
      - cookieAuth: []
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: commit
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: 删除成功
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/{saveId}/{commit}/data:
  get:
    operationId: getSaveDataLegacy
    summary: (Deprecated) 下载存档数据 - 使用 GET /saves/{commit}/data 代替
    tags: [Saves]
    parameters:
      - name: saveId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: commit
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 二进制数据
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/{commit}:
  get:
    operationId: getSave
    summary: 获取存档详情
    description: |
      通过 commit hash 获取指定存档的详细信息。commit 是全局唯一的。
    tags: [Saves]
    parameters:
      - name: commit
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 存档详情
        content:
          application/json:
            schema:
              $ref: '../schemas/save.yaml#/SaveDetail'
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

  delete:
    operationId: deleteSave
    summary: 删除存档
    description: |
      通过 commit hash 删除指定存档。仅作者可执行此操作。
      同时清理 R2 中的 quads.bin 二进制数据。
    tags: [Saves]
    security:
      - cookieAuth: []
    parameters:
      - name: commit
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: 删除成功
      '401':
        description: 未认证
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '403':
        description: 无权限
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/saves/{commit}/data:
  get:
    operationId: getSaveData
    summary: 下载存档数据
    description: |
      通过 commit hash 下载存档的 quads.bin 二进制数据。
    tags: [Saves]
    parameters:
      - name: commit
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: 二进制数据
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      '404':
        description: 存档不存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
