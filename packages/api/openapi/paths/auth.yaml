# Auth paths (deprecated)

/auth/register:
  post:
    summary: 用户注册 (已废弃)
    description: |
      **已废弃**: 请使用 better-auth/client 进行注册。
      
      ```typescript
      import { createAuthClient } from 'better-auth/client';
      const authClient = createAuthClient({ baseURL: 'https://api.pubwiki.com' });
      await authClient.signUp.email({ email, password, name, username });
      ```
    deprecated: true
    operationId: register
    tags:
      - Auth (Deprecated)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - username
              - email
              - password
            properties:
              username:
                type: string
                minLength: 3
                maxLength: 50
              email:
                type: string
                format: email
              password:
                type: string
                minLength: 8
              displayName:
                type: string
    responses:
      '201':
        description: 注册成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - user
                - token
              properties:
                message:
                  type: string
                  example: Registration successful
                user:
                  $ref: '../schemas/user.yaml#/PublicUser'
                token:
                  type: string
                  description: JWT token
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
      '409':
        description: 用户已存在
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'

/auth/login:
  post:
    summary: 用户登录 (已废弃)
    description: |
      **已废弃**: 请使用 better-auth/client 进行登录。
      
      ```typescript
      import { createAuthClient } from 'better-auth/client';
      const authClient = createAuthClient({ baseURL: 'https://api.pubwiki.com' });
      await authClient.signIn.email({ email, password });
      ```
    deprecated: true
    operationId: login
    tags:
      - Auth (Deprecated)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - usernameOrEmail
              - password
            properties:
              usernameOrEmail:
                type: string
                description: 用户名或邮箱
              password:
                type: string
    responses:
      '200':
        description: 登录成功
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - user
                - token
              properties:
                message:
                  type: string
                  example: Login successful
                user:
                  $ref: '../schemas/user.yaml#/PublicUser'
                token:
                  type: string
                  description: JWT token
      '401':
        description: 认证失败
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ApiError'
